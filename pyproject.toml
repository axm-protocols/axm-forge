[project]
name = "axm-ast"
dynamic = ["version"]
description = "AST introspection CLI for AI agents — powered by tree-sitter"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Gabriel Jarry", email = "jarry.gabriel@gmail.com" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "License :: OSI Approved :: Apache Software License",
]

dependencies = [
    "axm",
    "cyclopts>=3.0",
    "loguru>=0.7.3",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "tree-sitter>=0.24",
    "tree-sitter-python>=0.23",
]

[project.scripts]
axm-ast = "axm_ast.cli:main"

[project.urls]
Homepage = "https://github.com/axm-protocols/axm-ast"
Documentation = "https://axm-protocols.github.io/axm-ast/"
Repository = "https://github.com/axm-protocols/axm-ast.git"
Issues = "https://github.com/axm-protocols/axm-ast/issues"

# ---------------------------------------------------------------------------
# Entry points — auto-discovered by axm-mcp
# ---------------------------------------------------------------------------
[project.entry-points."axm.tools"]
ast_context  = "axm_ast.tools.context:ContextTool"
ast_describe = "axm_ast.tools.describe:DescribeTool"
ast_search   = "axm_ast.tools.search:SearchTool"
ast_callers  = "axm_ast.tools.callers:CallersTool"
ast_impact   = "axm_ast.tools.impact:ImpactTool"
ast_inspect  = "axm_ast.tools.inspect:InspectTool"
ast_graph    = "axm_ast.tools.graph:GraphTool"
ast_docs     = "axm_ast.tools.docs:DocsTool"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_ast/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_ast"]

# ─────────────────────────────────────────────────────────────────────────────
# UV Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.uv]
managed = true

[tool.uv.sources]
axm = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "pytest-mock>=3.0",
    "ruff>=0.8",
    "mypy>=1.14",
    "pre-commit>=4.0",
    "pip-audit>=2.0",
]
docs = [
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=0.27",
    "mkdocs-gen-files>=0.5",
    "mkdocs-literate-nav>=0.6",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py", "tests/fixtures"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "S", "T20", "RUF"]
ignore = ["S101", "S603", "S607"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108"]
"src/axm_ast/cli.py" = ["T201"]

[tool.ruff.lint.isort]
known-first-party = ["axm_ast"]

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
pretty = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = ["cyclopts.*", "tree_sitter.*", "tree_sitter_python.*", "axm.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["axm_ast.tools.*"]
disallow_subclassing_any = false

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_ast",
    "--cov-report=term-missing",
    "--cov-report=html:coverage_html",
    "--cov-report=xml",
    "--cov-fail-under=0",
]
filterwarnings = ["error"]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_ast"]
branch = true
relative_files = true
omit = ["*/tests/*"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Changelog Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "v[0-9].*"
