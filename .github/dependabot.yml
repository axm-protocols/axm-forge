version: 2
updates:
  # ── Workspace root: the single shared uv.lock ──────────────────────────────
  # uv ecosystem (Dependabot GA 2025-03) re-resolves the one workspace lockfile
  # (members share it) and the root pyproject. One consolidated weekly PR.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      all-dependencies:
        patterns:
          - "*"

  # ── Per published package: the pyproject CONSTRAINTS (the PyPI contract) ────
  # Each package is published independently to PyPI and is importable by third
  # parties (`uv add axm-audit`, Python API), so its own declared constraints
  # are a public contract worth keeping current — distinct from the shared lock
  # above. One grouped weekly PR per package.
  - package-ecosystem: uv
    directory: /packages/axm
    schedule:
      interval: weekly
    groups:
      axm:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-anvil
    schedule:
      interval: weekly
    groups:
      axm-anvil:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-ast
    schedule:
      interval: weekly
    groups:
      axm-ast:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-audit
    schedule:
      interval: weekly
    groups:
      axm-audit:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-edit
    schedule:
      interval: weekly
    groups:
      axm-edit:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-git
    schedule:
      interval: weekly
    groups:
      axm-git:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-init
    schedule:
      interval: weekly
    groups:
      axm-init:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-mcp
    schedule:
      interval: weekly
    groups:
      axm-mcp:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-smelt
    schedule:
      interval: weekly
    groups:
      axm-smelt:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /packages/axm-ingot
    schedule:
      interval: weekly
    groups:
      axm-ingot:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-echo
    schedule:
      interval: weekly
    groups:
      axm-echo:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-config
    schedule:
      interval: weekly
    groups:
      axm-config:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-vault
    schedule:
      interval: weekly
    groups:
      axm-vault:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /packages/axm-doctor
    schedule:
      interval: weekly
    groups:
      axm-doctor:
        patterns:
          - "*"

  # ── GitHub Actions used by the workspace workflows ─────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
