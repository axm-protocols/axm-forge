name: Publish to PyPI

on:
  push:
    tags:
      - "ast/v*"
      - "audit/v*"
      - "init/v*"
      - "git/v*"

jobs:
  detect-package:
    name: Detect Package
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.detect.outputs.package }}
      package-dir: ${{ steps.detect.outputs.package-dir }}
    steps:
      - id: detect
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == ast/* ]]; then
            echo "package=axm-ast" >> "$GITHUB_OUTPUT"
            echo "package-dir=packages/axm-ast" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == audit/* ]]; then
            echo "package=axm-audit" >> "$GITHUB_OUTPUT"
            echo "package-dir=packages/axm-audit" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == init/* ]]; then
            echo "package=axm-init" >> "$GITHUB_OUTPUT"
            echo "package-dir=packages/axm-init" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == git/* ]]; then
            echo "package=axm-git" >> "$GITHUB_OUTPUT"
            echo "package-dir=packages/axm-git" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown tag prefix: $TAG"
            exit 1
          fi

  test:
    name: Run Tests (${{ needs.detect-package.outputs.package }})
    needs: detect-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv sync --all-groups
      - run: uv run --package ${{ needs.detect-package.outputs.package }} --directory ${{ needs.detect-package.outputs.package-dir }} pytest --no-cov

  publish:
    name: Build and Publish (${{ needs.detect-package.outputs.package }})
    runs-on: ubuntu-latest
    needs: [detect-package, test]
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.detect-package.outputs.package }}/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv build --package ${{ needs.detect-package.outputs.package }}
      - uses: pypa/gh-action-pypi-publish@release/v1
