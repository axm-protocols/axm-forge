[project]
name = "axm-ast"
dynamic = ["version"]
description = "AST introspection CLI for AI agents — powered by tree-sitter"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Gabriel Jarry", email = "gabriel@axm-protocols.io" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "License :: OSI Approved :: Apache Software License",
]

dependencies = [
    "axm",
    "axm-ingot",
    "cyclopts>=3.0",
    "pydantic>=2.12.5",
    "tree-sitter>=0.24",
    "tree-sitter-python>=0.23",
]

[project.scripts]
axm-ast = "axm_ast.cli:main"

[project.urls]
Homepage = "https://github.com/axm-protocols/axm-ast"
Documentation = "https://axm-protocols.github.io/axm-ast/"
Repository = "https://github.com/axm-protocols/axm-ast.git"
Issues = "https://github.com/axm-protocols/axm-ast/issues"

# ---------------------------------------------------------------------------
# Entry points — auto-discovered by axm-mcp
# ---------------------------------------------------------------------------
[project.entry-points."axm.tools"]
ast_context  = "axm_ast.tools.context:ContextTool"
ast_describe = "axm_ast.tools.describe:DescribeTool"
ast_search   = "axm_ast.tools.search:SearchTool"
ast_callers  = "axm_ast.tools.callers:CallersTool"
ast_callees  = "axm_ast.tools.callees:CalleesTool"
ast_impact   = "axm_ast.tools.impact:ImpactTool"
ast_inspect  = "axm_ast.tools.inspect:InspectTool"
ast_graph    = "axm_ast.tools.graph:GraphTool"
ast_docs      = "axm_ast.tools.docs:DocsTool"
ast_dead_code = "axm_ast.tools.dead_code:DeadCodeTool"
ast_diff      = "axm_ast.tools.diff:DiffTool"
ast_flows      = "axm_ast.tools.flows:FlowsTool"
ast_doc_impact = "axm_ast.tools.doc_impact:DocImpactTool"
ast_file_header = "axm_ast.tools.file_header:AstFileHeaderTool"

[project.entry-points."axm.hooks"]
"ast:trace-source"  = "axm_ast.hooks.trace_source:TraceSourceHook"
"ast:impact"        = "axm_ast.hooks.impact:ImpactHook"
"ast:context"       = "axm_ast.hooks.context:ContextHook"
"ast:flows"         = "axm_ast.hooks.flows:FlowsHook"
"ast:source-body"   = "axm_ast.hooks.source_body:SourceBodyHook"
"ast:file-header"   = "axm_ast.hooks.file_header:FileHeaderHook"
"ast:doc-impact"    = "axm_ast.hooks.impact:DocImpactHook"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "ast/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match ast/v*" }
fallback-version = "0.1.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_ast/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_ast"]

[tool.hatch.build.targets.wheel.force-include]
"docs/index.md" = "axm_ast/docs/index.md"

# ─────────────────────────────────────────────────────────────────────────────
# UV Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.uv]
managed = true


[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff==0.15.17",
    "mypy>=1.20.0",
    "types-PyYAML>=6.0",
    "prek>=0.4.4",
    "pip-audit>=2.0",
    "radon>=6.0.1",
]
docs = [
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=1.0.3",
    "mkdocs-gen-files>=0.5",
    "mkdocs-literate-nav>=0.6.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py", "tests/fixtures"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "S", "T20", "PLR", "RUF"]
ignore = ["S101", "S603", "S607"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "PLR2004"]
"src/axm_ast/cli.py" = ["T201", "PLR0913"]
# Benchmark scripts are CLI tools that print results and probe internal
# cache state on purpose.
"benchmarks/*" = ["T201", "SLF001"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

[tool.ruff.lint.isort]
known-first-party = ["axm_ast"]

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
pretty = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true
exclude = ["tests/fixtures/"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]



[[tool.mypy.overrides]]
module = ["axm_ast.tools.*"]
disallow_subclassing_any = false

# Pydantic BaseModel subclasses inherit __init__(**data: Any) synthetically;
# disable explicit-Any on modules defining models.
[[tool.mypy.overrides]]
module = [
    "axm_ast.models.*",
    "axm_ast.core.flows",
    "axm_ast.core.impact",
]
disallow_any_explicit = false

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_ast",
    "--cov-report=term-missing",
    "--cov-report=html:coverage_html",
    "--cov-report=xml",
    "--cov-fail-under=0",
]
filterwarnings = ["error"]
markers = [
    "integration: marks tests as integration (2+ internal components with real I/O)",
    "functional: marks tests as functional (hitting real packages)",
    "e2e: marks tests as end-to-end (subprocess/CLI, black box)",
]

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_ast"]
pep621_dev_dependency_groups = ["dev", "docs"]

# ─────────────────────────────────────────────────────────────────────────────
# axm-audit Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.axm-audit.mirror]
exempt_paths = [
    "**/__init__.py",
    "_version.py",
    "core/search.py",         # pure TypedDict schemas
    "core/callers.py",        # tree-sitter Node operations, integration-only
    "core/git_coupling.py",   # requires real git, integration-only
    "core/structural_diff.py",# requires git worktrees, integration-only
    "tools/doc_impact.py",    # thin MCP facade, integration-covered
    "core/doc_impact.py",     # real-FS doc/signature scanning, integration-only
    "tools/inspect_resolve.py", # resolves symbols against real PackageInfo, integration-only
    "hooks/_trace_protocol.py", # Protocol typing stub (TYPE_CHECKING-only)
]
exempt_tests = [
    "test_init.py", # root __init__.py re-export smoke test — façade, no src module to mirror
]

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "77df94591005"
reason = "2 ContextHookDepth tests probe distinct depth branches with disjoint assertion fields: test_hook_depth_zero_compact (depth=0) asserts 'top_modules' present AND 'modules' absent in metadata.project_context, while test_hook_depth_one_packages (depth=1) asserts 'packages' present; they sit alongside test_hook_depth_none_full (depth=None, asserts modules+dependency_graph) so the three document mutually exclusive depth-mode contracts. Parametrizing the two flagged members would conflate the depth=0 compact-strip contract with the depth=1 package-grouping contract and force a heterogeneous expected-key parameter."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "7f52014a3ada"
reason = "2 DocsTool progressive-disclosure tests probe distinct detail modes with disjoint field contracts: test_docs_toc_returns_headings_not_content (detail='toc') asserts each page carries 'headings' AND 'line_count' AND no 'content', while test_docs_summary_returns_summaries (detail='summary') asserts 'headings' AND 'summaries' AND no 'content'; the distinguishing fields (line_count vs summaries) and the two distinct detail values are the documented contract, and both sit alongside test_docs_full_returns_content (detail full) so parametrizing would conflate three mutually exclusive disclosure modes."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "57ec34a2870e"
reason = "2 FlowsTool BFS tests probe distinct graph-shape contracts on incompatible fixtures: test_flows_empty_chain runs entry='greet' on the simple_pkg fixture (a leaf symbol with no callers/callees) and asserts count >= 0 to document the single-node graceful path, while test_flows_circular_ref runs entry='func_a' on the circular_pkg fixture (a.func_a imports b.func_b which imports back a.func_a) and asserts count >= 1 to document BFS termination without an infinite loop. Different fixtures (simple_pkg vs circular_pkg), different entry symbols, and different concerns (empty-chain vs cycle-termination) make folding impossible without conflating two unrelated traversal contracts."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f2a801fc0344"
reason = "2 FileHeaderHook tests in distinct classes probe unrelated contracts: TestFileHeaderDedup.test_file_header_dedup passes 'mod.py\\nmod.py' duplicate refs and asserts a single deduplicated header entry, while TestFileHeaderEmptyFile.test_file_header_empty_file writes an empty file and asserts the header renders as the empty string; deduplication of repeated refs and empty-content rendering are independent behaviors, parametrization would conflate two distinct hook concerns"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "e6ec77c97a56"
reason = "2 _inspect_symbol tests probe distinct error branches with divergent mock topologies: test_multiple_exact_matches_returns_disambiguation_error mocks search_symbols with two same-name hits and asserts 'Multiple' in error (disambiguation path), while test_no_exact_match_falls_through_not_substring additionally mocks inspect_module to None and asserts 'not found' in error (fallthrough path); the extra mock and the different error contract make them heterogeneous, parametrization would conflate two unrelated failure branches"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "471d4c755ebe"
reason = "2 CLI tests in distinct command classes probing different subcommands: TestGraphCommand.test_graph_mermaid runs 'graph --format mermaid' and asserts the mermaid/flowchart header, TestSearchCommand.test_search_by_returns runs 'search --returns str' and asserts a matched symbol; the shared _run + 'X in output or Y in output' shape is coincidental, parametrization would conflate two distinct CLI command contracts"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "290b176f5103"
reason = "13 CLI smoke tests across 5 commands (describe/inspect/graph/search/version) and 5 TestClass groups — each asserts a different command output; parametrization would conflate distinct CLI contracts"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f9a7b46e63e9"
reason = "12 InspectTool integration tests spanning 2 TestClasses with different fixtures (rich_pkg__from_inspect vs sample_project) and asserting on different symbol kinds (function/class/method/property/classmethod/module); fixture divergence prevents clean parametrization"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c39987e10950"
reason = "8 find_stale_signatures tests asserting on heterogeneous fields (actual_sig shapes for single/multiple/dotted/generic base classes; resilience to syntax_error / empty_file / qualified name collisions across modules and nested subpackages) with three distinct fixtures (src_layout, src_tree, tmp_path); each probes a different AST-extraction edge case that parametrization would erase"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d27d8ebd9890"
reason = "7 parse_docstring tests spanning three style classes (Google: summary_only, google_style_summary, args_not_in_output, returns_not_in_output; Sphinx: sphinx_summary; EdgeCases: unknown_section_ignored, indented_docstring) asserting on different ParsedDocstring fields (summary, raises, examples, hasattr negative checks) — parametrization would conflate three distinct docstring-style parsers and four distinct field-level contracts"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "192424123291"
reason = "7 structural_diff integration tests on shared _make_diff_project fixture asserting on different result dict keys: 'added' (added_symbol + added_from_new_file probe two distinct add paths — new symbol in existing file vs symbols from a new file), 'removed' (removed_symbol), 'modified' (modified_symbol), 'summary' (counts sub-dict), and per-symbol metadata (file/kind/name) — parametrization would erase these distinct observation surfaces of the diff API contract"

[[tool.axm-audit.duplicate_tests.acknowledged]]
