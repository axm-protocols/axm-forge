[project]
name = "axm-ast"
dynamic = ["version"]
description = "AST introspection CLI for AI agents — powered by tree-sitter"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Gabriel Jarry", email = "gabriel@axm-protocols.io" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "License :: OSI Approved :: Apache Software License",
]

dependencies = [
    "axm",
    "cyclopts>=3.0",
    "loguru>=0.7.3",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "tree-sitter>=0.24",
    "tree-sitter-python>=0.23",
]

[project.scripts]
axm-ast = "axm_ast.cli:main"

[project.urls]
Homepage = "https://github.com/axm-protocols/axm-ast"
Documentation = "https://axm-protocols.github.io/axm-ast/"
Repository = "https://github.com/axm-protocols/axm-ast.git"
Issues = "https://github.com/axm-protocols/axm-ast/issues"

# ---------------------------------------------------------------------------
# Entry points — auto-discovered by axm-mcp
# ---------------------------------------------------------------------------
[project.entry-points."axm.tools"]
ast_context  = "axm_ast.tools.context:ContextTool"
ast_describe = "axm_ast.tools.describe:DescribeTool"
ast_search   = "axm_ast.tools.search:SearchTool"
ast_callers  = "axm_ast.tools.callers:CallersTool"
ast_callees  = "axm_ast.tools.callees:CalleesTool"
ast_impact   = "axm_ast.tools.impact:ImpactTool"
ast_inspect  = "axm_ast.tools.inspect:InspectTool"
ast_graph    = "axm_ast.tools.graph:GraphTool"
ast_docs      = "axm_ast.tools.docs:DocsTool"
ast_dead_code = "axm_ast.tools.dead_code:DeadCodeTool"
ast_diff      = "axm_ast.tools.diff:DiffTool"
ast_flows      = "axm_ast.tools.flows:FlowsTool"
ast_doc_impact = "axm_ast.tools.doc_impact:DocImpactTool"

[project.entry-points."axm.hooks"]
"ast:trace-source"  = "axm_ast.hooks.trace_source:TraceSourceHook"
"ast:impact"        = "axm_ast.hooks.impact:ImpactHook"
"ast:context"       = "axm_ast.hooks.context:ContextHook"
"ast:flows"         = "axm_ast.hooks.flows:FlowsHook"
"ast:source-body"   = "axm_ast.hooks.source_body:SourceBodyHook"
"ast:file-header"   = "axm_ast.hooks.file_header:FileHeaderHook"
"ast:doc-impact"    = "axm_ast.hooks.impact:DocImpactHook"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "ast/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match ast/v*" }
fallback-version = "0.1.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_ast/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_ast"]

[tool.hatch.build.targets.wheel.force-include]
"docs/index.md" = "axm_ast/docs/index.md"

# ─────────────────────────────────────────────────────────────────────────────
# UV Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.uv]
managed = true


[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff==0.15.12",
    "mypy>=1.20.0",
    "types-PyYAML>=6.0",
    "pre-commit>=4.0",
    "pip-audit>=2.0",
    "radon>=6.0.1",
]
docs = [
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=1.0.3",
    "mkdocs-gen-files>=0.5",
    "mkdocs-literate-nav>=0.6.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py", "tests/fixtures"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "S", "T20", "PLR", "RUF"]
ignore = ["S101", "S603", "S607"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "PLR2004"]
"src/axm_ast/cli.py" = ["T201", "PLR0913"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

[tool.ruff.lint.isort]
known-first-party = ["axm_ast"]

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
pretty = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true
exclude = ["tests/fixtures/"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]



[[tool.mypy.overrides]]
module = ["axm_ast.tools.*"]
disallow_subclassing_any = false

# Pydantic BaseModel subclasses inherit __init__(**data: Any) synthetically;
# disable explicit-Any on modules defining models.
[[tool.mypy.overrides]]
module = [
    "axm_ast.models.*",
    "axm_ast.core.flows",
    "axm_ast.core.impact",
]
disallow_any_explicit = false

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_ast",
    "--cov-report=term-missing",
    "--cov-report=html:coverage_html",
    "--cov-report=xml",
    "--cov-fail-under=0",
]
filterwarnings = ["error"]
markers = [
    "integration: marks tests as integration (2+ internal components with real I/O)",
    "functional: marks tests as functional (hitting real packages)",
    "e2e: marks tests as end-to-end (subprocess/CLI, black box)",
]

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_ast"]
pep621_dev_dependency_groups = ["dev", "docs"]

# ─────────────────────────────────────────────────────────────────────────────
# axm-audit Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.axm-audit.mirror]
exempt_paths = [
    "**/__init__.py",
    "_version.py",
    "core/search.py",         # pure TypedDict schemas
    "core/callers.py",        # tree-sitter Node operations, integration-only
    "core/git_coupling.py",   # requires real git, integration-only
    "core/structural_diff.py",# requires git worktrees, integration-only
    "tools/doc_impact.py",    # thin MCP facade, integration-covered
    "hooks/_trace_protocol.py", # Protocol typing stub (TYPE_CHECKING-only)
]

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "290b176f5103"
reason = "13 CLI smoke tests across 5 commands (describe/inspect/graph/search/version) and 5 TestClass groups — each asserts a different command output; parametrization would conflate distinct CLI contracts"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f9a7b46e63e9"
reason = "12 InspectTool integration tests spanning 2 TestClasses with different fixtures (rich_pkg__from_inspect vs sample_project) and asserting on different symbol kinds (function/class/method/property/classmethod/module); fixture divergence prevents clean parametrization"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "00d154d029c4"
reason = "11 dead-code detection tests spanning two distinct concern classes (TestIntraModuleClassRefs: 4 tests about class-name reference detection — attr access, method call, type annotation, alias; TestAttributeRefs: 7 tests about self.attr reference detection in kwargs, dicts, lists, assignments, chained, bare, call) — parametrization would conflate two independent detection surfaces probed by find_dead_code"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f33694681051"
reason = "8 extract_references tests covering four distinct acceptance criteria of AXM-1723 (AC1: cast() typing, AC2: string annotations on var/return/param, AC3: subscript string args, plus positional-arg/attribute reference tracking from core.callers) with two different fixtures (mod_factory vs mod_factory__from_core_callers); parametrization would erase the AC-boundary documentation and conflate two fixture surfaces"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c39987e10950"
reason = "8 find_stale_signatures tests asserting on heterogeneous fields (actual_sig shapes for single/multiple/dotted/generic base classes; resilience to syntax_error / empty_file / qualified name collisions across modules and nested subpackages) with three distinct fixtures (src_layout, src_tree, tmp_path); each probes a different AST-extraction edge case that parametrization would erase"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d27d8ebd9890"
reason = "7 parse_docstring tests spanning three style classes (Google: summary_only, google_style_summary, args_not_in_output, returns_not_in_output; Sphinx: sphinx_summary; EdgeCases: unknown_section_ignored, indented_docstring) asserting on different ParsedDocstring fields (summary, raises, examples, hasattr negative checks) — parametrization would conflate three distinct docstring-style parsers and four distinct field-level contracts"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "ebf90edda9c0"
reason = "8 test_has_name unit tests live in 8 distinct tool-mirror test files (test_callers/context/describe/docs/graph/impact/inspect/search.py) — each instantiates a different Tool class (CallersTool, ContextTool, DescribeTool, DocsTool, GraphTool, ImpactTool, InspectTool, SearchTool) and asserts on its unique .name attribute; cross-file parametrization would break the 1:1 src/tools/ mirror layout and centralize tool-name contracts away from their owning test module"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c2551a956f23"
reason = "7 cache tests split across pyramid levels with incompatible fixtures: tests/integration/test_package_cache.py uses real tmp_path filesystem I/O (mkdir, write_text, unlink, mtime sleeps) to exercise PackageCache filesystem invalidation; tests/unit/core/test_cache.py mocks analyze_package via unittest.mock.patch + MagicMock for pure unit assertions on cache.get() call counts and identity — cross-pyramid parametrization would conflate real-I/O integration with mock-based unit coverage"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "192424123291"
reason = "7 structural_diff integration tests on shared _make_diff_project fixture asserting on different result dict keys: 'added' (added_symbol + added_from_new_file probe two distinct add paths — new symbol in existing file vs symbols from a new file), 'removed' (removed_symbol), 'modified' (modified_symbol), 'summary' (counts sub-dict), and per-symbol metadata (file/kind/name) — parametrization would erase these distinct observation surfaces of the diff API contract"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "7fd56798cdb0"
reason = "6 inspect_text render tests exercising three different render functions (render_class_text, render_variable_text, render_module_text) on distinct fixtures with field-level assertions: class_with_source asserts python fence + 'class ConfigLoader'; class_missing_keys asserts header-only rendering of EmptyClass without crash; variable_with_value asserts '= 30' value rendering; variable_with_annotation asserts ': int' type rendering; variable_missing_keys asserts UNKNOWN fallback; module_text asserts symbol count + per-function/class listing — parametrization would conflate three distinct renderer contracts"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "be3365445a1c"
reason = "6 analyze_package skip-directory tests probing distinct skip-resolution code paths with incompatible setups: test_skips_pycache (__pycache__ hard-coded blacklist), test_nested_skip_dir (.mypy_cache inside a nested sub-package), test_skips_gitignored_dirs (.gitignore + git init), test_works_outside_git_repo (no git repo fallback to hard-coded skips only), test_no_git_dir_graceful_fallback (.gitignore present but no .git dir), test_nested_gitignore_respected (sub-package .gitignore composition) — three live in TestAnalyzePackageGitignore and require _init_git_repo, three are top-level; the skip-mechanism axis (hard-coded vs gitignore vs nested) is the documentation surface"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "7c950537a3d4"
reason = "6 format_context_json depth-mode tests asserting on distinct dict subscopes of the JSON output contract: test_depth0_has_expected_keys (top-level depth=0 keys name/python/stack/patterns/top_modules), test_depth0_no_full_modules (negative: depth=0 strips modules/dependency_graph/axm_tools), test_depth0_top_modules_fields (per-entry name/symbol_count/stars inside top_modules list), test_depth0_patterns_compact (inner patterns dict module_count/function_count/class_count/layout), test_depth1_has_packages (depth=1 returns packages dict, drops top_modules), test_depth1_package_has_counts (per-package modules/symbols counts) — each probes a different region of the schema; parametrization would conflate four distinct depth/scope contracts"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "dab824cfb1a2"
reason = "5 test_bad_path unit tests live in 5 distinct tool-mirror test files (test_dead_code/describe/docs/flows/graph.py) — each instantiates a different Tool class (DeadCodeTool, DescribeTool, DocsTool, FlowsTool, GraphTool) and exercises its own .execute(path=\"/nonexistent/...\") error path; cross-file parametrization would break the 1:1 src/tools/ mirror contract"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "b57adba0c9ad"
reason = "6 test_name unit tests live in 6 distinct tool-mirror test files (test_describe/diff/doc_impact_text/flows/graph/search.py) — each instantiates a different Tool class (DescribeTool, DiffTool, DocImpactTool, FlowsTool, GraphTool, SearchTool) and asserts on its unique .name attribute (ast_describe, ast_diff, ast_doc_impact, ast_flows, ast_graph, ast_search); cross-file parametrization would break the 1:1 src/tools/ mirror contract and centralize tool-name assertions away from their owning test module (same rationale as acked cluster ebf90edda9c0)"

[tool.deptry.per_rule_ignores]
DEP002 = ["loguru", "pydantic-settings"]
DEP004 = ["mkdocs_gen_files"]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_ast"]
branch = true
relative_files = true
omit = ["*/tests/*"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Changelog Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "ast/v[0-9].*"
include_path = "packages/axm-ast/**"
