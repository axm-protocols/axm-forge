reason = "4 inter-file tests across 2 files probe distinct trace_flow not-found scenarios with divergent fixtures: test_entry_point_not_found (tests/integration/test_analyze_package__trace_flow.py) builds a real on-disk package via _make_pkg + analyze_package and asserts trace_flow raises ValueError on a missing function — exercising the full _find_symbol_location path against PackageInfo built from real source, while the three unit tests (test_trace_flow_symbol_not_found_raises, test_trace_flow_qualified_name_not_found_raises, test_trace_flow_empty_package_raises in tests/unit/core/test_flows.py) use MagicMock pkg + monkeypatched _find_symbol_location returning (None, 0) and only differ by the input symbol shape (plain / qualified 'Foo.nonexistent' / empty-package 'anything') to document that the qualified-name resolver and the empty-symbol-set path both surface ValueError instead of silent empty results. Real-package vs monkeypatched-symbol-location fixtures cannot be parametrized without losing the integration coverage of _find_symbol_location."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "ad392d3bdeff"
reason = "4 inter-file tests across 4 files probe four distinct tool surfaces with different SUTs, fixtures, and return-key contracts: test_detects_unused_function (test_dead_code_tool.py) asserts 'unused_function' in [s['name'] for s in result.data['dead_symbols']] on a dead_pkg fixture (used_function + unused_function + UsedClass tree), test_execute_returns_modules (test_describe_tool.py) asserts 'modules' in result.data from DescribeTool on a sample_project conftest fixture, test_docs_returns_readme (test_docs_tool.py) asserts 'readme' in result.data from DocsTool on the same sample_project, and test_graph_returns_edges (test_graph_tool.py) asserts 'graph' in result.data from GraphTool on sample_project / 'src' / 'demo'. Four different MCP tool classes (DeadCodeTool / DescribeTool / DocsTool / GraphTool), four different result.data keys (dead_symbols / modules / readme / graph), two different fixture roots (dead_pkg vs sample_project) — no parametrizable contract; each test pins its own tool's API surface."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "49c4ed966804"
reason = "4 inter-file tests across 3 files probe four distinct hook SUTs with different required parameters: test_missing_symbol in TestImpactHookExecuteUnit (test_impact.py) asserts ImpactHook().execute({}) fails with 'symbol' in error, test_missing_symbol in TestDocImpactHookExecuteUnit (same file) asserts the same on DocImpactHook (a separate hook class with its own contract), test_missing_symbol_param (test_source_body.py) asserts SourceBodyHook().execute({}) fails with 'symbol' in error, and test_missing_entry (test_trace_source.py) asserts TraceSourceHook().execute({}) fails with 'entry' in (result.error or '') — TraceSourceHook requires 'entry', not 'symbol', so the assertion contract is materially different. Four independent hook classes (ImpactHook / DocImpactHook / SourceBodyHook / TraceSourceHook) each pin their own required-param contract; no shared parametrizable seam exists."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f029124e2fdf"
reason = "4 GraphTool.execute text-presence tests across two TestClass groups (TestExecutePkgWithText: package-scope on fixture_pkg; TestExecuteWsWithText: workspace-scope on fixture_ws) probe three distinct output formats (json/mermaid/text) and assert on three distinct result.data keys (nodes/mermaid/text/graph) — fixture_pkg builds a real on-disk Python package while fixture_ws builds a uv workspace with three member packages and dependency edges, so the SUT branch exercised is different (package detect path vs workspace detect path). Parametrization would conflate two scope branches, two divergent fixtures, and four heterogeneous data-key assertions."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "90defd92e211"
reason = "4 find_stale_signatures AST-extraction tests pin four distinct actual_sig contracts on three divergent fixtures: test_extracts_function_signature asserts 'def greet(name: str) -> str' (typed function signature) on src_layout, test_extracts_class_no_bases asserts 'class Base' (bare class, no parens) on src_layout, test_extracts_async_function asserts 'async def fetch(url: str) -> bytes' (async-prefix preservation) on src_layout, and test_flat_layout_without_src_directory asserts 'def helper() -> None' on flat_layout (project-root scan path without src/, a distinct layout-resolution branch). Each test documents a separate AST signature-rendering rule (function / bare class / async / no-src layout) — parametrizing the four divergent actual_sig literals and two layout fixtures would erase the per-rule documentation surface."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d9530754f33e"
reason = "4 filter_modules tests probe three mutually exclusive assertion contracts: test_filter_modules_none and test_filter_modules_empty_list both assert len(result.modules) == len(pkg.modules) (None and [] are passthrough branches of the same fallback), test_filter_modules_no_match asserts len(result.modules) == 0 against a literal-0 contract for non-matching needles, and test_filter_modules_case_insensitive calls filter_modules twice (lower=['utils'], upper=['UTILS']) and asserts len(lower.modules) == len(upper.modules) — a comparison-of-two-results shape with no expected literal. Three different assertion shapes (passthrough-equals-pkg / equals-0 / equals-other-filter) cannot be folded into a single expected_count parameter without erasing the per-branch documentation."

[tool.deptry.per_rule_ignores]
DEP002 = ["loguru", "pydantic-settings"]
DEP004 = ["mkdocs_gen_files"]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_ast"]
branch = true
relative_files = true
omit = ["*/tests/*"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Changelog Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "ast/v[0-9].*"
include_path = "packages/axm-ast/**"
