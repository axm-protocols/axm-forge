[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "be3365445a1c"
reason = "6 analyze_package skip-directory tests probing distinct skip-resolution code paths with incompatible setups: test_skips_pycache (__pycache__ hard-coded blacklist), test_nested_skip_dir (.mypy_cache inside a nested sub-package), test_skips_gitignored_dirs (.gitignore + git init), test_works_outside_git_repo (no git repo fallback to hard-coded skips only), test_no_git_dir_graceful_fallback (.gitignore present but no .git dir), test_nested_gitignore_respected (sub-package .gitignore composition) — three live in TestAnalyzePackageGitignore and require _init_git_repo, three are top-level; the skip-mechanism axis (hard-coded vs gitignore vs nested) is the documentation surface"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "7c950537a3d4"
reason = "6 format_context_json depth-mode tests asserting on distinct dict subscopes of the JSON output contract: test_depth0_has_expected_keys (top-level depth=0 keys name/python/stack/patterns/top_modules), test_depth0_no_full_modules (negative: depth=0 strips modules/dependency_graph/axm_tools), test_depth0_top_modules_fields (per-entry name/symbol_count/stars inside top_modules list), test_depth0_patterns_compact (inner patterns dict module_count/function_count/class_count/layout), test_depth1_has_packages (depth=1 returns packages dict, drops top_modules), test_depth1_package_has_counts (per-package modules/symbols counts) — each probes a different region of the schema; parametrization would conflate four distinct depth/scope contracts"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "dda854a2ad14"
reason = "5 test_bad_path unit tests live in 5 distinct tool-mirror test files (test_dead_code/describe/docs/flows/graph.py) — each instantiates a different Tool class (DeadCodeTool, DescribeTool, DocsTool, FlowsTool, GraphTool) and exercises its own .execute(path=\"/nonexistent/...\") error path; cross-file parametrization would break the 1:1 src/tools/ mirror contract"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "4f82f9d1ae07"
reason = "5 analyze_package tests mix two distinct contracts: 3 success-path src-layout/namespace tests (test_src_layout_multiple_packages, test_namespace_package_no_init, test_src_layout_name — assert on pkg.name with different fixtures: 2-package src, namespace-no-init, single-pkg src) and 2 error-or-empty-path tests inside TestAnalyzePackageIntegration (test_not_a_directory uses pytest.raises(ValueError, match='not a directory'); test_no_python_files asserts pkg.modules == [] on empty dir) — parametrization would conflate raises-vs-success branches and force a heterogeneous expected_* parameter across mutually exclusive assertion targets (.name vs .modules vs exception)"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "3a89b94d3d70"
reason = "5 CLI error-path tests probe two distinct error surfaces with overlapping coverage already in place: (1) invalid-path validation — test_describe_invalid_path and test_inspect_invalid_path are subsumed by TestResolveDir.test_cli_invalid_path, an already-parametrized test that sweeps 11 commands through the shared _resolve_dir helper; (2) symbol-resolution failures inside inspect — test_inspect_method_not_found ('Calculator.nonexistent', missing method on existing class) and test_inspect_class_not_found ('NonExistent.method', missing class) exercise two different branches of the symbol-lookup error path that are unrelated to path validation; cross-class parametrization would conflate path-validation contract with symbol-resolution contract and erase the documentation value of TestResolveDir as the canonical invalid-path sweep"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "3ecfef5c87fe"
reason = "5 render_impact_text tests probe distinct branches of the text renderer: test_callers_none and test_tests_none (TestRenderImpactSingleMinimal, minimal_report fixture) assert the 'Callers: none' / 'Tests: none' default-empty rendering, while test_empty_callers_list, test_cross_package_mixed_types and test_caller_without_line (TestRenderImpactEdgeCases, ad-hoc dicts) cover three independent edge-cases — empty callers list, mixed dict/str cross-package entries, and caller dict missing the 'line' key falling back to module-only. Parametrizing across two fixtures and four unrelated branches of the renderer would erase the documentation value of each edge-case test."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "db153c82d1b8"
reason = "5 build_detail/*_detail tests mix two unrelated absent-key contracts that should not be folded together: (1) the 'no module key in non-module details' contract — test_variable_detail_no_module_key, test_function_detail_no_module_key, test_class_detail_no_module_key — each calls a different concrete builder (variable_detail vs function_detail vs class_detail) with its own fixture (sample_var_no_module/sample_fn_no_module/sample_cls_no_module) and asserts 'module' not in result; (2) the 'no source key by default' contract in TestBuildDetail and TestVariableSourceNotIncluded — test_source_not_included_by_default (function) and test_variable_source_not_included_by_default (variable) — asserts 'source' not in detail when the source flag is omitted. Parametrizing across two different builders (variable_detail/function_detail/class_detail vs build_detail) and two different absent keys ('module' vs 'source') would force a heterogeneous expected_key parameter and erase the per-builder + per-concern boundary."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f150e7b80e87"
reason = "5 is_public/is_private tests cover the same name-prefix rule across two distinct Pydantic models and a dunder edge case: TestClassInfo.test_is_public/test_is_private exercise ClassInfo.is_public (\"Parser\" vs \"_Internal\"), the module-level test_is_public/test_is_private exercise FunctionInfo.is_public (\"greet\" vs \"_helper\"), and test_dunder_is_private exercises the dunder-name branch on FunctionInfo (\"__init__\" → is_public False). Each model owns its own is_public computed field and the dunder rule is specific to FunctionInfo (ClassInfo has no dunder branch) — cross-model parametrization would erase the per-model contract boundary and conflate the dunder edge case with the regular underscore-prefix rule."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "37b53b3ce996"
reason = "5 SearchTool kind-filter tests mix two distinct contracts that must remain separate: (1) the primary kind-filter contract in TestSearchByKind (test_filter_by_class and test_filter_by_function) asserts that kind='class'/'function' returns the right symbols AND excludes the wrong ones (User/Admin in, greet/compute out, and vice-versa); (2) the variable-support regression contract in TestSearchVariables (test_search_function_unchanged, test_search_class_unchanged, test_search_variable_kind_filter) verifies that adding kind='variable' did NOT break the function/class filters and that the new variable kind itself returns _TOLERANCE/MAX_RETRIES while excluding greet/User. Parametrizing across the two classes would erase the regression-suite boundary and conflate the kind-filter base contract with the variable-support migration guarantee."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "e7a1dc990a9d"
reason = "5 find_module_for_symbol tests cover two distinct lookup contracts across two pyramid mirrors that must stay separate: (1) the by-name lookup contract in tests/unit/core/test_analyzer.py — test_find_function_by_name, test_find_class_by_name, test_find_variable_by_name — asserts the string-name lookup path correctly routes to the function/class/variable bucket of the module; (2) the by-object-identity lookup contract — test_find_class_by_object (analyzer mirror, passes sample_class) and test_find_by_object_identity (tests/unit/models/test_nodes.py, passes sample_func) — asserts the alternate identity-based lookup path returns the owning module for a node object. The two by-object tests live in different mirror files because each exercises identity lookup with its own node type (ClassInfo vs FunctionInfo) and the test_nodes.py copy covers FunctionInfo as a node-model regression. Cross-file parametrize would force moving a node-model test across the unit-mirror boundary (PRACTICE_TEST_MIRROR) and conflate name-keyed vs identity-keyed lookup branches."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c2487fc202d6"
reason = "4 analyze_workspace tests probe four mutually exclusive contracts that cannot be parametrized into a single assertion shape: test_analyze_workspace_builds_edges_from_deps asserts (\"pkg-b\", \"pkg-a\") in ws.package_edges (literal-member dep → edge), test_analyze_workspace_builds_edges_from_glob_members asserts (\"packages/pkg-b\", \"pkg-a\") in ws.package_edges with a different source-key format because the member was glob-discovered, test_analyze_workspace_not_workspace uses pytest.raises(ValueError) on a non-workspace pyproject (no [tool.uv.workspace]), and test_analyze_workspace_no_deps_yields_no_edges asserts ws.package_edges == [] for empty dependencies — three distinct assertion targets (tuple-in-list / raises-exception / equals-empty) across four divergent fixtures; folding would erase the doc value of each contract."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "e9baaa42a18f"
reason = "4 inter-file tests across 2 files probe distinct trace_flow not-found scenarios with divergent fixtures: test_entry_point_not_found (tests/integration/test_analyze_package__trace_flow.py) builds a real on-disk package via _make_pkg + analyze_package and asserts trace_flow raises ValueError on a missing function — exercising the full _find_symbol_location path against PackageInfo built from real source, while the three unit tests (test_trace_flow_symbol_not_found_raises, test_trace_flow_qualified_name_not_found_raises, test_trace_flow_empty_package_raises in tests/unit/core/test_flows.py) use MagicMock pkg + monkeypatched _find_symbol_location returning (None, 0) and only differ by the input symbol shape (plain / qualified 'Foo.nonexistent' / empty-package 'anything') to document that the qualified-name resolver and the empty-symbol-set path both surface ValueError instead of silent empty results. Real-package vs monkeypatched-symbol-location fixtures cannot be parametrized without losing the integration coverage of _find_symbol_location."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "ad392d3bdeff"
reason = "4 inter-file tests across 4 files probe four distinct tool surfaces with different SUTs, fixtures, and return-key contracts: test_detects_unused_function (test_dead_code_tool.py) asserts 'unused_function' in [s['name'] for s in result.data['dead_symbols']] on a dead_pkg fixture (used_function + unused_function + UsedClass tree), test_execute_returns_modules (test_describe_tool.py) asserts 'modules' in result.data from DescribeTool on a sample_project conftest fixture, test_docs_returns_readme (test_docs_tool.py) asserts 'readme' in result.data from DocsTool on the same sample_project, and test_graph_returns_edges (test_graph_tool.py) asserts 'graph' in result.data from GraphTool on sample_project / 'src' / 'demo'. Four different MCP tool classes (DeadCodeTool / DescribeTool / DocsTool / GraphTool), four different result.data keys (dead_symbols / modules / readme / graph), two different fixture roots (dead_pkg vs sample_project) — no parametrizable contract; each test pins its own tool's API surface."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "49c4ed966804"
reason = "4 inter-file tests across 3 files probe four distinct hook SUTs with different required parameters: test_missing_symbol in TestImpactHookExecuteUnit (test_impact.py) asserts ImpactHook().execute({}) fails with 'symbol' in error, test_missing_symbol in TestDocImpactHookExecuteUnit (same file) asserts the same on DocImpactHook (a separate hook class with its own contract), test_missing_symbol_param (test_source_body.py) asserts SourceBodyHook().execute({}) fails with 'symbol' in error, and test_missing_entry (test_trace_source.py) asserts TraceSourceHook().execute({}) fails with 'entry' in (result.error or '') — TraceSourceHook requires 'entry', not 'symbol', so the assertion contract is materially different. Four independent hook classes (ImpactHook / DocImpactHook / SourceBodyHook / TraceSourceHook) each pin their own required-param contract; no shared parametrizable seam exists."

