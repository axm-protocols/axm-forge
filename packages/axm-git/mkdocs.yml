site_name: git
docs_dir: docs

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Overview: index.md
  - Tutorials:
    - Getting Started: tutorials/getting-started.md
  - How-To Guides:
    - index: howto/index.md
    - Use via MCP: howto/mcp.md
  - Reference:
    - CLI: reference/cli.md
    - Python API: reference/
  - Explanation:
    - Architecture: explanation/architecture.md
