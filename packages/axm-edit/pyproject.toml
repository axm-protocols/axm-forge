[project]
name = "axm-edit"
dynamic = ["version"]
description = "AXM Edit — Atomic batch file editing for AI agents."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "Gabriel Jarry", email = "gabriel@axm-protocols.io" }]
keywords = ["batch-edit", "file-editing", "agent", "mcp", "refactoring"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "axm",
    "pydantic>=2.0.0",
]

[project.urls]
Homepage = "https://forge.axm-protocols.io"
Documentation = "https://forge.axm-protocols.io"
Repository = "https://github.com/axm-protocols/axm-forge"
Issues = "https://github.com/axm-protocols/axm-forge/issues"

[project.entry-points."axm.tools"]
batch_edit     = "axm_edit.tools.batch_edit:BatchEditTool"
batch_rollback = "axm_edit.tools.batch_rollback:BatchRollbackTool"
read_file      = "axm_edit.tools.read_file:ReadFileTool"
write_file     = "axm_edit.tools.write_file:WriteFileTool"
edit_file      = "axm_edit.tools.edit_file:EditFileTool"
search_files   = "axm_edit.tools.search_files:SearchFilesTool"
run_command    = "axm_edit.tools.run_command:RunCommandTool"
list_dir       = "axm_edit.tools.list_dir:ListDirTool"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "edit/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match edit/v*" }
fallback-version = "0.0.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_edit/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_edit"]

# ─────────────────────────────────────────────────────────────────────────────
# Dependency Groups
# ─────────────────────────────────────────────────────────────────────────────
[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff==0.15.14",
    "mypy>=1.20.0",
    "pre-commit>=4.0",
    "pip-audit>=2.0",
]
docs = [
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=1.0.3",
    "mkdocs-gen-files>=0.5",
    "mkdocs-literate-nav>=0.6.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "S", "T20", "PLR", "RUF"]
ignore = ["S101", "S603", "S607"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "PLR2004"]

[tool.ruff.lint.isort]
known-first-party = ["axm_edit"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
pretty = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true

[[tool.mypy.overrides]]
module = ["tests.*", "conftest"]
disallow_untyped_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]

[[tool.mypy.overrides]]
module = ["axm_core.*", "axm.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["axm_edit.tools.*"]
disallow_subclassing_any = false

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_edit"]

[tool.deptry.per_rule_ignores]
DEP004 = ["mkdocs_gen_files", "pytest"]

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_edit",
    "--cov-report=term-missing",
    "--cov-report=html:coverage_html",
    "--cov-report=xml",
    "--cov-fail-under=0",
]
filterwarnings = ["error"]
markers = [
    "integration: tests that exercise real I/O (subprocess, filesystem, network)",
    "e2e: black-box tests invoking the CLI via subprocess",
]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_edit"]
branch = true
relative_files = true
omit = ["*/tests/*"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Changelog Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "edit/v[0-9].*"

# ─────────────────────────────────────────────────────────────────────────────
# axm-audit — acknowledged duplicate-test clusters
# ─────────────────────────────────────────────────────────────────────────────
[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "326ec035fabb"
reason = "Each test exercises a distinct failure branch with a different error message (replace missing-file, create-existing, delete-missing, path-traversal, ambiguous-old, old-not-found) — assertions diverge in meaning."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f26434dd4326"
reason = "Single-file merge of one op with two edits and merge of two separate ReplaceOps both assert modified==1, while multi-file fuzzy asserts modified==2 — distinct merge/multi-file semantics."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c39ab82e47b2"
reason = "Overlapping-edit rejection and valid/invalid-mix atomicity assert the same untouched-file invariant via different rejection branches."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "2ad0bc069b49"
reason = "Path-traversal rejection is tested for ReplaceOp and DeleteOp separately — different SUT operations sharing the security guard."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "fac43fd49caa"
reason = "Reindent path (unindented old gets file indent) versus exact-match no-reindent path assert opposite indentation outcomes."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d4b947565f33"
reason = "lint-skip-on-failure exercises two distinct guard branches — a validation failure on a missing-old edit versus the empty-operations guard — so the no-ruff invariant is reached through different code paths."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "2a91ff34a51e"
reason = "no-lint_errors is reached by two unrelated mechanisms: project-config E722 suppression via pyproject.toml versus claude_fix returning [] — different SUT aspects, not different literals."
