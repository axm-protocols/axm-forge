[project]
name = "axm-edit"
dynamic = ["version"]
description = "AXM Edit — Atomic batch file editing for AI agents."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "Gabriel Jarry", email = "gabriel@axm-protocols.io" }]
keywords = ["batch-edit", "file-editing", "agent", "mcp", "refactoring"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "axm",
    "pydantic>=2.0.0",
]

[project.urls]
Homepage = "https://forge.axm-protocols.io"
Documentation = "https://forge.axm-protocols.io"
Repository = "https://github.com/axm-protocols/axm-forge"
Issues = "https://github.com/axm-protocols/axm-forge/issues"

[project.entry-points."axm.tools"]
batch_edit     = "axm_edit.tools.batch_edit:BatchEditTool"
batch_rollback = "axm_edit.tools.batch_rollback:BatchRollbackTool"
read_file      = "axm_edit.tools.read_file:ReadFileTool"
write_file     = "axm_edit.tools.write_file:WriteFileTool"
edit_file      = "axm_edit.tools.edit_file:EditFileTool"
search_files   = "axm_edit.tools.search_files:SearchFilesTool"
run_command    = "axm_edit.tools.run_command:RunCommandTool"
list_dir       = "axm_edit.tools.list_dir:ListDirTool"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "edit/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match edit/v*" }
fallback-version = "0.0.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_edit/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_edit"]

[tool.hatch.build.targets.wheel.force-include]
"docs/index.md" = "axm_edit/docs/index.md"

# ─────────────────────────────────────────────────────────────────────────────
# Dependency Groups
# ─────────────────────────────────────────────────────────────────────────────
[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff==0.15.14",
    "mypy>=1.20.0",
    "pre-commit>=4.0",
    "pip-audit>=2.0",
]
docs = [
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=1.0.3",
    "mkdocs-gen-files>=0.5",
    "mkdocs-literate-nav>=0.6.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "S", "T20", "PLR", "RUF"]
ignore = ["S101", "S603", "S607"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "PLR2004"]

[tool.ruff.lint.isort]
known-first-party = ["axm_edit"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
pretty = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true

[[tool.mypy.overrides]]
module = ["tests.*", "conftest"]
disallow_untyped_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]

[[tool.mypy.overrides]]
module = ["axm_core.*", "axm.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["axm_edit.tools.*"]
disallow_subclassing_any = false

# ─────────────────────────────────────────────────────────────────────────────
# axm-audit — mirror rule exemptions
# ─────────────────────────────────────────────────────────────────────────────
# core/engine.py (batch_apply) and core/checkpoint.py (create_checkpoint/rollback)
# do real filesystem + git I/O; they are covered by integration tests
# (tests/integration/test_batch_apply__*.py, test_create_checkpoint*.py), not by
# mock-everything unit tests. Exempt from the 1:1 unit-mirror requirement.
[tool.axm-audit.mirror]
exempt_paths = ["core/engine.py", "core/checkpoint.py"]

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_edit"]

[tool.deptry.per_rule_ignores]
DEP004 = ["mkdocs_gen_files", "pytest"]

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_edit",
    "--cov-report=term-missing",
    "--cov-report=html:coverage_html",
    "--cov-report=xml",
    "--cov-fail-under=0",
]
filterwarnings = ["error"]
markers = [
    "integration: tests that exercise real I/O (subprocess, filesystem, network)",
    "e2e: black-box tests invoking the CLI via subprocess",
]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_edit"]
branch = true
relative_files = true
omit = ["*/tests/*"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Changelog Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "edit/v[0-9].*"

# ─────────────────────────────────────────────────────────────────────────────
# axm-audit — acknowledged duplicate-test clusters
# ─────────────────────────────────────────────────────────────────────────────
[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d4b947565f33"
reason = "lint-skip-on-failure exercises two distinct guard branches — a validation failure on a missing-old edit versus the empty-operations guard — so the no-ruff invariant is reached through different code paths."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "2a91ff34a51e"
reason = "no-lint_errors is reached by two unrelated mechanisms: project-config E722 suppression via pyproject.toml versus claude_fix returning [] — different SUT aspects, not different literals."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d0a55703a068"
reason = "Distinct indent-normalization and smart-quote happy paths spread across two files with their own per-test fixtures (bottom-to-top shift, dedent match, multi-line block, smart/wrapped quotes, exact-match-preferred) — each asserts a different rewritten literal."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "ebcce1633f01"
reason = "Each test_name asserts a different tool's name literal (batch_edit, batch_rollback, list_dir, read_file, run_command, search_files) — six distinct SUTs, not one duplicated assertion."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "89d734402dd3"
reason = "Six distinct failure branches of batch_apply (create-existing, delete-missing, ambiguous-old, old-not-found, path-traversal, replace-file-not-found) each assert a different error message, only sharing the not-success shape."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "70bc0aacea54"
reason = "Different multi-edit scenarios with divergent summary expectations — multi_file_fuzzy asserts modified==2 across two files, multiple_edits_same_file and two_replace_ops_same_file assert modified==1 (merge into one file)."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "4ee6e5cd7e73"
reason = "test_name asserts a different tool's name literal for EditFileTool (edit_file) versus WriteFileTool (write_file) — two distinct SUTs."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f1fa35f55a9f"
reason = "test_agent_hint_exists exercises the agent_hint of two distinct tools, EditFileTool and WriteFileTool — same shape, different SUTs."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "44b49a80eb93"
reason = "apply_edits_replace asserts result is True with rewritten content, apply_edits_no_match asserts result is False with the file unchanged — opposite outcome branches."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "1d67a6ea42b7"
reason = "path_traversal_in_replace and path_traversal_in_delete exercise the shared guard through two distinct operation types (ReplaceOp versus DeleteOp) — different SUTs sharing one invariant."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "05d3a38d9867"
reason = "valid_and_invalid_mix tests atomic rollback when a valid op is paired with a missing-file delete, while overlapping_edits_rejected tests the overlap-detection branch — two different rejection paths."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "5df3b4dfb677"
reason = "warnings_in_result patches _has_ruff=False asserting the 'ruff not found' warning, while ruff_invocation_fails raises OSError/PermissionError asserting the 'ruff fix failed' warning — different branches and warning literals."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "89b173f70a71"
reason = "no_claude_skips_autofix patches _has_claude=False asserting the 'claude not found' warning, while claude_timeout_graceful raises TimeoutExpired asserting the 'timed out' warning — different branches and warning literals."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "4fd94f98d713"
reason = "no_git_dir runs create_checkpoint on a non-git tmp dir while clean_repo_returns_none runs it on a clean git repo — both return None but via two distinct branches reached through different fixtures."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "6c60cc1ab0d2"
reason = "garbage_output returns unparseable returncode=1 stdout while timeout_handled raises TimeoutExpired — claude_fix leaves the file unchanged through two different exception/return branches."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "6a5db45256cc"
reason = "file_not_found raises FileNotFoundError on the subprocess while unparseable_format returns non-JSON text — both return the original errors but via the missing-binary versus parse-failure branches."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "cdcb5f59af29"
reason = "execute_no_operations asserts BatchEditTool's 'No operations' guard, no_checkpoint asserts BatchRollbackTool's 'checkpoint is required' guard — two distinct tools and error literals."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "1c13d64781e7"
reason = "single_line_reindent asserts new content gains the file's indent, while exact_match_no_reindent asserts the matched-with-indent case must NOT double-indent — opposite indentation outcomes."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "9aa447f8d297"
reason = "nonexistent_file asserts the 'not found' error while path_traversal asserts the 'escapes' error — two distinct error conditions of ReadFileTool with different literals."
