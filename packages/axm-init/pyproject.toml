[project]
name = "axm-init"
dynamic = ["version"]
description = "AXM Init — Python project scaffolding CLI with Copier templates."
readme = "README.md"
authors = [{ name = "Gabriel Jarry", email = "gabriel@axm-protocols.io" }]
requires-python = ">=3.12"
license = "Apache-2.0"
keywords = ["cli", "python", "project", "governance", "scaffolding", "standards"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "pydantic>=2.0.0",
    "cyclopts>=4.5.1",
    "httpx>=0.28.1",
    "copier>=9.14.1",
    "axm",
]

[project.urls]
Homepage = "https://github.com/axm-protocols/axm-init"
Documentation = "https://axm-protocols.github.io/axm-init/"
Repository = "https://github.com/axm-protocols/axm-init.git"
Issues = "https://github.com/axm-protocols/axm-init/issues"

[project.scripts]
axm-init = "axm_init.cli:main"

[project.entry-points."axm.tools"]
init_scaffold = "axm_init.tools.scaffold:InitScaffoldTool"
init_check    = "axm_init.tools.check:InitCheckTool"
init_reserve  = "axm_init.tools.reserve:InitReserveTool"

[project.entry-points."axm.commands"]
init_scaffold = "axm_init.cli:scaffold"
init_check    = "axm_init.cli:check"
init_reserve  = "axm_init.cli:reserve"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "init/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match init/v*" }
fallback-version = "0.1.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_init/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_init"]

[tool.hatch.build.targets.wheel.force-include]
"docs/index.md" = "axm_init/docs/index.md"

# ─────────────────────────────────────────────────────────────────────────────
# UV Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.uv]
managed = true


[dependency-groups]
dev = [
    "mypy>=1.20.0",
    "pip-audit>=2.7.3",
    "pre-commit>=4.5.1",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "radon>=6.0.1",
    "ruff==0.15.12",
]
docs = [
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=1.0.3",
    "mkdocs-gen-files>=0.5",
    "mkdocs-literate-nav>=0.6.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "BLE", # flake8-blind-except
    "C4",  # flake8-comprehensions
    "C901",# mccabe complexity
    "PLR", # pylint refactor (magic numbers)
    "S",   # flake8-bandit (security)
    "T20", # flake8-print
    "RUF", # ruff-specific
]
ignore = [
    "S101",  # Allow assert in tests
    "S603",  # subprocess call in controlled CLI
    "S607",  # partial path for uv/gh CLI tools
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "PLR2004", "BLE001"]
"src/axm_init/checks/*" = ["PLR2004", "BLE001"]
"src/axm_init/adapters/*" = ["BLE001", "PLR2004"]
"src/axm_init/core/checker.py" = ["PLR2004"]
"src/axm_init/core/reserver.py" = ["PLR0911"]
"src/axm_init/models/check.py" = ["PLR2004"]
"src/axm_init/tools/*" = ["BLE001"]
"src/axm_init/cli.py" = ["PLR0913", "PLR5501", "PLR2004"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

[tool.ruff.lint.isort]
known-first-party = ["axm_init"]

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_init"]
extend_exclude = ["src/axm_init/templates/.*"]

[tool.deptry.per_rule_ignores]
DEP003 = ["tomli"]
DEP004 = ["mkdocs_gen_files", "pytest"]

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_init",
    "--cov-report=term-missing",
    "--cov-report=html:coverage_html",
    "--cov-fail-under=0",
    "-m",
    "not slow",
]
markers = [
    "slow: marks tests that invoke real Copier (deselect with '-m \"not slow\"')",
    "integration: tests that exercise real I/O (filesystem, network, DB)",
    "e2e: end-to-end tests (subprocess/CLI, black box)",
]
filterwarnings = [
    # Copier uses deprecated pathspec API — upstream issue, not ours
    "ignore::DeprecationWarning:pathspec.*",
]

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true
pretty = true
exclude = ["src/axm_init/templates/"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]



[[tool.mypy.overrides]]
module = ["axm_init.tools.*"]
disallow_subclassing_any = false

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_init"]
branch = true
relative_files = true
omit = ["*/tests/*", "*/templates/*"]

[tool.axm-audit.mirror]
exempt_paths = [
    "checks/changelog.py",
    "checks/ci.py",
    "checks/deps.py",
    "checks/docs.py",
    "checks/pyproject.py",
    "checks/structure.py",
    "checks/tooling.py",
    "adapters/filesystem.py",
    "adapters/makefile.py",
    "adapters/workspace_patcher.py",
    "templates/**/*.py",
]

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "7d18a25d6d01"
reason = "TestWorkspaceTemplateStructure.test_root_files and TestMemberTemplateStructure.test_root_files verify different fixtures (ws_template vs member_template) with different expected filename lists per template type — intentional structural separation, not duplicated coverage."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "563e11fa07a0"
reason = "test_dependabot asserts one specific CI metadata file while test_docs_files asserts three distinct docs files — different observation surfaces (CI infra vs docs scaffolding) with different cardinalities."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "f7c645dfe553"
reason = "test_pyproject_has_workspace_config verifies the uv workspace declaration in pyproject.toml.jinja with two specific TOML key assertions; test_mkdocs_has_monorepo verifies the monorepo plugin marker in mkdocs.yml.jinja — different template files and different configuration contracts."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "1e61607587a7"
reason = "test_fail_missing_new_rules verifies all four missing rule names appear in details; test_fail_subset_of_new_rules verifies a different rule subset AND the exact pluralised message string (‘Missing 2 essential ruff rule(s)’), so the two cover distinct contracts (details enumeration vs message templating)."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "9fbf3e249d01"
reason = "test_full_reserve_success, test_reserve_build_fails, and test_reserve_publish_fails exercise three distinct branches of reserve_pypi with different mock setups (build OK+publish OK vs build fail vs build OK+publish fail) and assert on different message literals ('Reserved' vs 'Build failed' vs 'Publish failed')."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "9db99ab739b6"
reason = "test_reserve_race_condition (TAKEN on recheck), test_reserve_idempotent_rerun (AVAILABLE on recheck), and test_reserve_availability_error (initial ERROR, no build/publish mocks) cover three distinct PyPIAdapter side-effect scenarios with divergent mock setups and divergent message literals ('taken by another user' vs 'already reserved' vs 'availability')."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "93bfc85f33aa"
reason = "test_cli_reserve_no_author_exits patches _git_config_get with return_value='' (no author at all) and asserts '--author' in stderr; test_cli_reserve_no_email_exits uses side_effect=['Real Author', ''] (author present, email missing) and asserts '--email' — two distinct config-resolution branches with divergent mock topology."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d8e1ea58007a"
reason = "test_no_members_passes writes a pyproject with empty members and asserts 'No members' in message; test_no_pyproject_passes writes nothing (no pyproject.toml at root) and asserts 'No pyproject.toml' in message — two disjoint setups exercising distinct early-return branches of check_root_name_collision."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "1221afb14327"
reason = "test_root_name_collision_detected asserts both not result.passed AND 'collides' in result.message (exact-match collision branch); test_case_insensitive_collision uses different literals ('My-App' vs 'my-app') and only asserts not result.passed — different case-folding branch with weaker assertion granularity."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "4c1c5bc60a4a"
reason = "The 9 check_plugins scenarios cover distinct workspace-fallback branches: success via workspace_member fixture; local-nav-only with root resolving all 3; local has some + root has rest; self-contained local member (no root needed); standalone non-workspace failure; nav-only + nav-only root failure; standalone not under packages/; workspace member with no root mkdocs.yml. Each uses a different fixture (workspace_member / workspace_project / workspace / standalone_project / tmp_path) and asserts on different result.details[0] / result.message substrings — they aren't variations of one scenario but eight distinct branches of the local/root mkdocs resolution logic."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "2a74775d2299"
reason = "test_quality_workflow_missing has no axm-quality.yml at all and asserts 'not found' in message; test_missing_audit writes a workflow without 'audit' and asserts 'audit' in message; test_missing_coverage writes one without 'coverage' and asserts 'coverage' in message; test_missing_both writes neither and asserts both substrings — four distinct file-presence/content branches with divergent assertion targets."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d4ac5367f675"
reason = "test_pass_flat_package (src/pkg/__init__.py → pass + '1 package'), test_pass_namespace_package (src/ns/pkg/__init__.py → pass + '1 package'), test_fail_empty_src (empty src/ → fail + 'No Python package found'), and test_pass_mixed_layout (flat + nested → pass + '2 package') exercise four distinct layout branches with diverging pass/fail outcomes and message-literal cardinalities."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "aeadf89a56b0"
reason = "test_gen_ref_pages_in_workspace (file at workspace root → pass), test_gen_ref_pages_nowhere (workspace layout, no file → fail), and test_gen_ref_pages_no_workspace (standalone, no workspace structure → fail) cover three distinct filesystem-shape branches with disjoint setups and pass/fail outcomes."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c128c5e3dd03"
reason = "test_mkdocs_exists_workspace_member (workspace_member fixture, asserts passed=True via root fallback), test_mkdocs_exists_standalone (standalone_project tmp_path fixture, asserts passed=False), and test_mkdocs_exists_packages_parent_no_workspace_mkdocs (workspace_member_no_root_mkdocs fixture: packages/ parent without root mkdocs.yml, asserts passed=False) exercise three distinct fixture-shape branches with divergent pass/fail outcomes. Parametrize via getfixturevalue confuses the pyramid auditor; keeping them separate preserves the integration-level classification."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "bfd1190b6904"
reason = "test_non_tty_exits (stdin.isatty=False, no getpass patch), test_invalid_token_exits (tty=True + getpass='not-a-valid-token' → prefix-validation branch), and test_empty_input_exits (tty=True + getpass='' → empty-string branch) exercise three distinct resolve_pypi_token exit paths with divergent mock topology (no-getpass vs getpass-with-invalid vs getpass-with-empty)."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "7eb0d1a0a905"
reason = "test_nonexistent_path_returns_error and test_file_path_returns_error both assert 'Not a directory' but exercise distinct filesystem branches (missing path vs file-not-dir); test_check_engine_exception_caught patches CheckEngine to raise and asserts the propagated 'engine failure' literal — a separate exception-handling branch with different mock surface and divergent error message."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "329dd2f25a4d"
reason = "test_marker_present_but_no_list_items (tags marker with non-list child → preserves 'nothing_here: true'), test_no_tags_marker_creates_section (no tags marker → creates push.tags + asserts 'push:'/'tags:'/'\"my-lib/v*\"'), and test_existing_tags_with_default_indent (existing tags list → asserts both '- \"existing/v*\"' and '- \"my-lib/v*\"' with detected indent) cover three distinct YAML-mutation branches with divergent assertion shapes and content literals."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "fe9ff27e6b54"
reason = "test_missing_tests uses ws_root fixture, deletes tests/ directory via shutil.rmtree, and asserts 'tests/' appears in details; test_missing_pyproject_in_member uses raw tmp_path to scaffold a member without src/ and asserts 'src/' in details — different setup approach (fixture-mutation vs tmp_path builder) and different missing-artifact assertion targets."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d064727e0f25"
reason = "test_pass_no_config uses empty_project fixture (no .pre-commit-config.yaml → PASS, weight=2) while test_fail_when_hooks_missing writes a config and parametrizes over .git/ presence (config + missing hooks → FAIL) — opposite pass/fail outcomes with divergent setups."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "00d1abdb1a4c"
reason = "test_fails_without_workspace writes a standalone pyproject.toml without any ruff config at tmp_path root; test_falls_back_to_member_only creates packages/pkg/pyproject.toml (member-only, no workspace root pyproject) — both assert not result.passed but exercise distinct filesystem-shape fallback branches."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "556ba8b3ac5f"
reason = "test_importmode_missing uses ws_root fixture and asserts 'importlib' literal in message (missing import_mode branch); test_no_pyproject_fails uses bare tmp_path with no pyproject.toml and asserts 'No pyproject.toml' literal (file-absent branch) — two disjoint early-return paths with divergent message assertions."

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Configuration (Changelog Generation)
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "init/v[0-9].*"
include_path = "packages/axm-init/**"
