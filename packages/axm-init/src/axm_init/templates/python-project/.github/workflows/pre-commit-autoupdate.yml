name: prek autoupdate

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    name: Update prek hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: uv tool install prek
      - run: prek autoupdate

      - uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/prek-autoupdate
          title: 'chore(deps): prek autoupdate'
          commit-message: 'chore(deps): prek autoupdate'
          body: |
            Automated prek hook version bump via
            `prek autoupdate`.
          delete-branch: true
