version: 2
updates:
  # uv ecosystem (Dependabot GA 2025-03): updates pyproject constraints AND
  # re-resolves uv.lock. `pip` only touched constraints, never the lockfile.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pre-commit"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
