name: prek autoupdate

on:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv tool install prek
      - run: prek autoupdate
      - uses: peter-evans/create-pull-request@v8
        with:
          title: "chore: prek autoupdate"
          commit-message: "chore: prek autoupdate"
          branch: prek-autoupdate
