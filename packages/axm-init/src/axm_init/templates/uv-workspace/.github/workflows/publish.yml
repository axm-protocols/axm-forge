name: Publish

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      # Build every publishable workspace member into dist/ (root `uv build`
      # builds nothing in a workspace). Adjust the glob if some members are
      # not meant to be published.
      - name: Build members
        run: |
          shopt -s nullglob
          for pkg in packages/*/; do
            name=$(basename "$pkg")
            uv build --package "$name"
          done
      - uses: pypa/gh-action-pypi-publish@release/v1
