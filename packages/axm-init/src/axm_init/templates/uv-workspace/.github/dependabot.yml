version: 2
updates:
  # uv ecosystem (Dependabot GA 2025-03): re-resolves the single workspace
  # uv.lock natively (the only lock; members share it) and bumps runtime too.
  # `pip` only touched constraints and never the lockfile.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      # One consolidated weekly PR for the whole workspace.
      all-dependencies:
        patterns:
          - "*"

  # Per-package entries (one `directory: /packages/<name>` block per published
  # member, to keep its pyproject constraints — its PyPI contract — current) are
  # appended here automatically by `axm-init scaffold --member`.

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
