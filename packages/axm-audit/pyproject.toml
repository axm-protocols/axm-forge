[tool.mypy]
python_version = "3.12"
strict = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
show_error_codes = true
pretty = true
disallow_incomplete_defs = true
check_untyped_defs = true
plugins = ["pydantic.mypy"]
# fix-corpus input/expected trees are fixture mini-packages that reference
# modules only resolvable inside a per-test temp dir — skip type analysis.
exclude = ["tests/fixtures/fix_corpus/[^/]+/(input|expected)/"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]

[[tool.mypy.overrides]]
module = ["_registry_helpers"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["radon.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["axm_anvil.*"]
ignore_missing_imports = true

# core/fix/ is relocated CST-based test reorganiser code: libcst's API and the
# Python ast module both surface untyped values that explode mypy strict-mode
# (no-any-unimported, no-any-explicit, no-any-return). Relax strictness here
# rather than scatter inline `type: ignore`s — same pragmatic posture used by
# axm_audit.core.rules.quality for untyped third-party calls.
[[tool.mypy.overrides]]
module = ["axm_audit.core.fix.*"]
disallow_any_unimported = false
disallow_any_explicit = false
disallow_any_generics = false
warn_return_any = false
disallow_untyped_calls = false
disable_error_code = [
    "no-any-return",
    "no-any-unimported",
    "misc",
    "arg-type",
    "attr-defined",
    "assignment",
    "unused-ignore",
    "type-arg",
    "operator",
    "call-overload",
    "return-value",
    "union-attr",
]

[[tool.mypy.overrides]]
module = ["axm_audit.core.rules.quality"]
disallow_untyped_calls = false


[[tool.mypy.overrides]]
module = ["axm_audit.tools.*"]
disallow_subclassing_any = false

[[tool.mypy.overrides]]
module = ["axm_audit.cli"]
disallow_untyped_decorators = false

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--cov=src/axm_audit",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--import-mode=importlib",
]
pythonpath = ["src", "tests"]
filterwarnings = ["ignore::DeprecationWarning"]
asyncio_mode = "auto"
markers = [
    "integration: integration tests (real I/O, filesystem, DB, network)",
    "e2e: end-to-end tests (subprocess, CLI black box)",
    "slow: long-running tests (opt-in via -m slow)",
    "tautology_ok: opt out of TEST_QUALITY_TAUTOLOGY (optional reason arg)",
    "no_package_symbol_ok: opt out of TEST_QUALITY_NO_PACKAGE_SYMBOL (legitimate script-shim e2e)",
]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src"]
branch = true
relative_files = true
omit = ["*/tests/*"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Configuration (Changelog Generation)
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "audit/v[0-9].*"
include_path = "packages/axm-audit/**"
