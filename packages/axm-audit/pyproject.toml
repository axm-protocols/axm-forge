[project]
name = "axm-audit"
dynamic = ["version"]
description = "Code auditing and quality rules for AXM"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "AXM Protocols", email = "gabriel@axm-protocols.io" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "axm",
    "axm-ast",
    "complexipy>=5.4.0",
    "cyclopts>=3.0",
    "pydantic>=2.12.5",
    "radon>=6.0.1",
]

[project.scripts]
axm-audit = "axm_audit.cli:main"

[project.urls]
Homepage = "https://github.com/axm-protocols/axm-audit"
Documentation = "https://axm-protocols.github.io/axm-audit/"
Repository = "https://github.com/axm-protocols/axm-audit"
Issues = "https://github.com/axm-protocols/axm-audit/issues"

[project.entry-points."axm.tools"]
audit = "axm_audit.tools.audit:AuditTool"
audit_test = "axm_audit.tools.audit_test:AuditTestTool"

[project.entry-points."axm.witnesses"]
audit_quality = "axm_audit.witnesses.audit_quality:AuditQualityRule"

[project.entry-points."axm.hooks"]
"audit:autofix" = "axm_audit.hooks.autofix:AutofixHook"
"audit:quality-check" = "axm_audit.hooks.quality_check:QualityCheckHook"

[project.entry-points."axm.commands"]
audit = "axm_audit.cli:app"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"


[tool.hatch.version]
source = "vcs"
tag-pattern = "audit/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match audit/v*" }
fallback-version = "0.1.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_audit/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_audit"]

[tool.hatch.build.targets.wheel.force-include]
"docs/test_quality.md" = "axm_audit/docs/test_quality.md"
"docs/index.md" = "axm_audit/docs/index.md"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-asyncio>=0.24",
    "pytest-json-report>=1.5",
    "pytest-mock>=3.15.1",
    "ruff==0.15.12",
    "mypy>=1.20.0",
    "pre-commit>=4.0",
    "pip-audit>=2.0",
    "bandit>=1.9.3",
]
docs = [
    "mkdocs-gen-files>=0.6.0",
    "mkdocs-literate-nav>=0.6.3",
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=1.0.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
exclude = ["*/_version.py", "scripts/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "PLR", "S", "T20", "RUF"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "PLR2004"]
"src/axm_audit/core/rules/quality.py" = ["S603", "S607"]
"src/axm_audit/core/rules/dependencies.py" = ["S603", "S607"]
"src/axm_audit/cli.py" = ["T201", "PLR0913"]
"src/axm_audit/core/test_runner.py" = ["PLR0913"]
# Pydantic models intentionally use `Field(default_factory=...)` for mutable defaults.
"src/axm_audit/core/rules/test_quality/duplicate_tests.py" = ["RUF012"]
"src/axm_audit/core/rules/test_quality/pyramid_level.py" = ["RUF012"]
"src/axm_audit/core/rules/test_quality/tautology.py" = ["RUF012"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

[tool.ruff.lint.isort]
known-first-party = ["axm_audit"]

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_audit"]
extend_exclude = ["scripts"]

[tool.deptry.per_rule_ignores]
DEP004 = ["mkdocs_gen_files"]

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.axm-audit.mirror]
# tools/audit.py is the `axm-audit audit` sub-command wrapper. Per the pyramid
# spec, the single-binary canonical e2e name strips the binary prefix, so
# `tests/e2e/test_audit.py` IS the canonical form — not an anti-mirror smell.
exempt_paths = ["**/__init__.py", "_version.py", "__main__.py", "tools/audit.py"]

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "bae3922cf705"
reason = "Tests cover orthogonal format_report concerns (pass/fail icons, category grouping, per-check score display, Improvements section presence/details/tip) with distinct assertion targets; collapsing would lose signal."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "de885c684c98"
reason = "Tests cover distinct contracts: 'Score:' header, project_path fallback to 'unknown', category=None grouping under 'other', and format_json required-key surface; each guards a separate format_report/format_json branch."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "0a7c6a5b3a39"
reason = "format_agent_text branches under test are distinct: passed-actionable rendering (✓ + rule_id), failed-no-text-falls-back-to-details path, and empty-input header counts (0 pass/0 fail); each guards a different rendering branch."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "6314b4ebf3f9"
reason = "Each test guards a distinct check-details renderer (QUALITY_SECURITY top_issues with severity/code/file/line vs DEPS_HYGIENE top_issues with code/module/message); the two schemas are unrelated and asserted on different rendered prefixes."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "231e97b89c9a"
reason = "Tests guard 4 distinct quality_score properties across different classes: parametrized range over every scored category (TestQualityScoreRange), single-category averaging behaviour (TestSingleCategoryAveraging), filtered-audit renormalisation invariant (TestFilteredAuditRenormalization), and an ignore-unknown-inputs branch; collapsing would erase the property each class documents."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "8049e70ad5cd"
reason = "Tests target different scoring surfaces: registry-derived all-100 invariant (TestRegistryDerivedScoring), registry-resilience to new rules (rule-addition guard), and public-API single-category renormalisation; each guards a distinct contract (registry coverage vs API behaviour) at different abstraction layers."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c2d6c85495c6"
reason = "Tests assert different bound contracts: the first checks the absolute [0, 100] envelope from a heterogeneous LINT+TYPE pair, the second asserts the tighter [min(cat_avg), max(cat_avg)] = [60, 90] envelope when categories are combined; collapsing would lose the combine-vs-clamp distinction."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d11f876f75c9"
reason = "Each test guards a distinct I/O-detection branch of PyramidLevelRule: import-then-called (R1 httpx call), stat-family attr (Path.is_file syscall), tmp_path.write_text boundary signal, and constructor-result-flow taint to method call ('fixture-arg:tmp_path'); they assert different io_signals strings and cannot be folded without losing the branch each documents."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "051a12ddc441"
reason = "Tests guard 3 disjoint classification branches: R2 pure-function unit path (asserts reason 'pure function'), R3 per-function attr:.write_text() signal, and the tmp_path+write/read boundary signal; each asserts a different io_signals string or 'reason' field, so they document independent classifier rules."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "9cbc773e0783"
reason = "Both tests assert level=='unit' negatively but guard orthogonal R1/R5 sub-rules: imported-but-unused module (httpx) must not produce the 'imports httpx' signal, while a string-literal receiver of .replace() must not trigger 'attr:.replace()'; the heuristics live in different code paths and the assertions probe different io_signals."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "e4797f11d445"
reason = "Tests assert opposite classifications (integration vs unit) on unrelated fixture/code-shape patterns: a conftest `fake_*` fixture that performs real I/O must NOT be mock-neutralised, while a tmp_path argument passed to a pydantic constructor inside pytest.raises must NOT be tainted; they exercise different sub-rules."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "3f38caa6fa2b"
reason = "Tests guard 3 disjoint tautology-triage steps with different action/rule pairs: step_n2_import_smoke yields DELETE, step_n1_no_siblings yields STRENGTHEN, and step0_marker_opt_out yields KEEP; the assertions probe distinct verdict branches and cannot be folded."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "83f58bf1906b"
reason = "Tests guard opposite verdicts on different inputs: a self-compare assertion yields STRENGTHEN+step0_self_compare, while an unclassified isinstance(x, object) yields UNKNOWN+step5_default_unknown; collapsing would erase the strengthened-vs-fallback boundary."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "e2edc9eb0fa1"
reason = "Tests assert opposite actions on Foo constructor siblings: distinct kwargs (name='a' vs name='b') yield STRENGTHEN+step1b_different_args, while identical n-copies (both name='x') yield DELETE+step0b_n_copies_constructor; the two paths exercise different triage rules."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "cfabeb33831e"
reason = "Tests guard different rule-count surfaces: get_rules_for_category(None) asserts the total registry size (==31), while test_category_filter_unchanged parametrizes the exact count per scored category; collapsing would erase the total-vs-per-category distinction."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "07ee4df7a7fe"
reason = "Tests guard distinct contracts: get_rules_by_category parametrizes per-category lower-bound counts (len >= 1) across all scored categories, while picks_up_registrations asserts get_rules_for_category honours a monkeypatched registry override; one probes baseline coverage, the other probes registry plumbing."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "52b6ec3e7024"
reason = "Tests assert different rule_id membership surfaces: category_filter_includes_new_rules guards practices category contents (PRACTICE_BLOCKING_IO in, PRACTICE_LOGGING out, PRACTICE_DOCSTRING in), while all_rules_includes_tooling guards the all-rules path surfaces TOOL_RUFF/TOOL_MYPY/TOOL_UV; one probes filtering, the other probes auto-discovery."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "586c324779d9"
reason = "Cluster covers 3 distinct setup-divergence sub-cases of DuplicateTestsRule: signal1/signal3 module-level pair (no setUp), raises-symmetric pair (both-with vs neither-with pytest.raises), and same self.parser SUT after setUp; each asserts a different signal prefix or signal name and probes an independent clustering branch."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "7a4f2c51e702"
reason = "Tests assert different signal names on different inputs: cross_class_pair asserts signal=='ambiguous_distinct_class' for two TestFoo/TestBar bodies, while one_with_raises_one_without asserts signal=='ambiguous_raises_divergence' for an asymmetric pytest.raises pair; collapsing erases the distinct-class-vs-raises-divergence distinction."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "608caa63b77c"
reason = "Tests probe two distinct config-fallback branches of DuplicateTestsRule: no pyproject.toml at all vs pyproject without the [tool.axm-audit.duplicate_tests] section; both must not raise config_error but each exercises a separate filesystem/parsing path (file missing vs section missing)."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "57d28ca015b8"
reason = "Tests guard 3 disjoint glob semantics in MirrorRule.exempt_paths: 'commands/*.py' single-directory match (data.py in exempt), '**/_facade.py' nested-path match (recursive descent), and '*.py' single-star non-crossing slash (sub/foo.py stays in missing); each pins a different glob feature."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "ff7b20c24c43"
reason = "Tests probe 3 orthogonal MirrorRule branches: backwards-compatible no-section legacy behavior (foo.py in missing, exempt=[]), '?' single-char glob match (v1.py in exempt), and exempt module that has a test still allowed (missing=[] AND data.py in exempt); each asserts a different missing/exempt outcome."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "42c00bc8cde3"
reason = "Tests guard distinct text-rendering branches: single-missing module asserts the literal '• untested: utils.py' line and absence of '(+', while private-module checks that '_facade.py' (leading underscore) survives the text formatter; collapsing erases the truncation-vs-private-name distinction."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "6d5d053e7ffd"
reason = "Cluster covers 7 disjoint criterion-(a) detection paths of test_references_first_party: direct first-party import+call, fixture return-annotation (Rule), fixture body returning Rule(), module-helper closure with first-party symbol, stdlib-only (negative), first-party-only-in-fixture-body closure extension, and unconsumed-fixture param-gating (negative); each probes a different resolver branch with True/False verdicts."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "037cd1d18781"
reason = "Cluster covers 6 disjoint criterion-(b) detection paths of test_invokes_in_package_script: subprocess.run with declared 'pkg-cli' script, 'python -m pkg_cli' module-path form (underscore alias), plumbing-only subprocess (git/uv, negative), CliRunner().invoke for single-binary packages, unresolved-argv permissiveness, and subprocess-only-in-fixture-body closure; each probes a different invocation detector branch."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "3741fa066258"
reason = "Tests probe 3 disjoint cross-file abstract-override branches: undocumented @abstractmethod parent (impl.py:process in missing), non-abstract cross-file override (impl.py:compute in missing), and ambiguous name-collision conservative path (two Base classes → impl.py:do_work counted); each asserts a different missing-entry contract."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "69215f8917a6"
reason = "Tests guard two same-file override branches with different parent kinds: undocumented @abstractmethod parent (process_entries≥1) vs non-abstract parent with docstring override-without-docstring (process_entries≥1); both assert >=1 count but exercise different abstract-vs-concrete inheritance paths in _analyze_docstrings."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "cadd568de417"
reason = "Tests guard 3 disjoint NoPackageSymbolRule branches: parametrized 'either-criterion passes' verdict (a-only/b-only/both bodies in tests/integration/), file-level pytest.mark.no_package_symbol_ok marker exclusion, and the tests/unit/ tier always being skipped; each probes a different rule path with no shared input/assertion shape."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "efdd6ffcf529"
reason = "Tests assert no-finding on two structurally different legitimate inputs: an e2e test invoking the declared CLI via subprocess (criterion b) and an integration test importing a first-party symbol (criterion a); each pins a different criterion path in NoPackageSymbolRule."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "eee3071fb748"
reason = "Tests guard two disjoint extract_imports branches: parametrized single-statement cases (plain import vs relative-import-no-module) asserting the resulting module list, and the __future__-only edge case asserting an empty list; the assertion shapes (parametrized expected list vs literal == []) are not foldable without erasing the __future__-directive-excluded contract."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "4a41a7e4f458"
reason = "Tests guard two disjoint strip_prefix branches: parametrized inputs (shared-prefix strips, no-dot returns unchanged, mixed-prefix returns unchanged) asserting full output equality, and the empty-list edge case asserting == [] directly; the shapes (parametrized expected list vs literal empty) are not foldable without losing the empty-input contract."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "711a9dd09b86"
reason = "Cluster covers 3 disjoint detect_first_party_packages branches with different setups: short-circuit when [tool.deptry] known_first_party is set (returns []), parametrized non-short-circuit cases (no-pyproject, no-deptry-section, malformed-toml — all return ['mypkg']), and the empty src/ directory edge case (returns []); each probes a different config-vs-filesystem detection path."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "62d416d20d18"
reason = "Tests guard 3 disjoint _report_to_result text-rendering branches of TestCoverageRule: failure-test-id with '::' separator (asserts FAIL last-segment 'test_bar'), failure-test-id without '::' (asserts FAIL unchanged 'test_simple'), and 100% coverage + 1 failure (asserts no 'cov' line, only FAIL line); each probes a different rendering path on different inputs."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "3e82563cc26a"
reason = "Tests guard two disjoint AuditQualityRule aggregation branches in distinct classes: TestAuditQualityLintFails fakes lint=2 fails + type=pass (asserts '2 violation(s)', verifies type still ran despite lint failure — no short-circuit on lint), TestAuditQualityBothFail fakes lint=1 + type=2 fails (asserts '3 violation(s)', cross-category aggregation); each pins a different no-short-circuit semantics with different mock side_effect shapes and cannot be folded."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "cc3f9a49d858"
reason = "Tests guard two disjoint ASTCache lifecycle branches inside TestUnitScope: test_default_is_none asserts get_ast_cache() is None at module init (no prior set, default ContextVar value), while test_clear asserts the same None after a set_ast_cache(ASTCache()) + set_ast_cache(None) round-trip (clearing semantics); the setup divergence is the contract being pinned and cannot be folded."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "225268402bde"
reason = "Cluster spans 3 disjoint read_coupling_config branches: overrides for an existing first-party module (rules.quality=20), overrides silently kept for a nonexistent module (no.such.module=25), and the unrelated severity_error_multiplier=3 field (different tuple slot); each pins a distinct assertion target (overrides dict membership vs multiplier int) and cannot be folded."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d64d53ad6b2c"
reason = "Tests guard 3 disjoint AntiMirrorRule pass-branches: scenario-named tests (assert passed AND score==100 across integration+e2e dirs), unit-dir is never walked (AC13, unit/test_foo.py source-name collision must NOT flag), and exempt_paths config (commands/*.py glob via pyproject [tool.axm-audit.mirror].exempt_paths skips anti-mirror); each probes a different rule path with distinct setup (no config / unit dir only / pyproject config) and cannot be folded."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "7fa1b65783dd"
reason = "Cluster spans two distinct SUTs in test_test_runner: TestParseFailures.test_empty_list and test_passing_tests_skipped exercise parse_failures([]) / parse_failures([passed]), while TestParseCollectorErrors.test_empty_list exercises parse_collector_errors([]); both parsers are public API and each empty-list contract guards a different function — folding would erase the parse_failures vs parse_collector_errors boundary."

[tool.mypy]
python_version = "3.12"
strict = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
show_error_codes = true
pretty = true
disallow_incomplete_defs = true
check_untyped_defs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]

[[tool.mypy.overrides]]
module = ["_registry_helpers"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["radon.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["axm_audit.core.rules.quality"]
disallow_untyped_calls = false


[[tool.mypy.overrides]]
module = ["axm_audit.tools.*"]
disallow_subclassing_any = false

[[tool.mypy.overrides]]
module = ["axm_audit.cli"]
disallow_untyped_decorators = false

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--cov=src/axm_audit",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--import-mode=importlib",
]
pythonpath = ["src", "tests"]
filterwarnings = ["ignore::DeprecationWarning"]
asyncio_mode = "auto"
markers = [
    "integration: integration tests (real I/O, filesystem, DB, network)",
    "e2e: end-to-end tests (subprocess, CLI black box)",
    "tautology_ok: opt out of TEST_QUALITY_TAUTOLOGY (optional reason arg)",
]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src"]
branch = true
relative_files = true
omit = ["*/tests/*"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Configuration (Changelog Generation)
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "audit/v[0-9].*"
include_path = "packages/axm-audit/**"
