[project]
name = "axm-audit"
dynamic = ["version"]
description = "Code auditing and quality rules for AXM"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "AXM Protocols", email = "gabriel@axm-protocols.io" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "axm",
    "axm-anvil",
    "axm-ast",
    "complexipy>=5.4.0",
    "cyclopts>=3.0",
    "libcst>=1.5.0",
    "pydantic>=2.12.5",
    "radon>=6.0.1",
]

[project.scripts]
axm-audit = "axm_audit.cli:main"

[project.urls]
Homepage = "https://github.com/axm-protocols/axm-audit"
Documentation = "https://axm-protocols.github.io/axm-audit/"
Repository = "https://github.com/axm-protocols/axm-audit"
Issues = "https://github.com/axm-protocols/axm-audit/issues"

[project.entry-points."axm.tools"]
audit = "axm_audit.tools.audit:AuditTool"
audit_test = "axm_audit.tools.audit_test:AuditTestTool"
audit_fix = "axm_audit.tools.audit_fix:AuditFixTool"

[project.entry-points."axm.witnesses"]
audit_quality = "axm_audit.witnesses.audit_quality:AuditQualityRule"

[project.entry-points."axm.hooks"]
"audit:autofix" = "axm_audit.hooks.autofix:AutofixHook"
"audit:quality-check" = "axm_audit.hooks.quality_check:QualityCheckHook"

[project.entry-points."axm.commands"]
audit = "axm_audit.cli:app"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"


[tool.hatch.version]
source = "vcs"
tag-pattern = "audit/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match audit/v*" }
fallback-version = "0.1.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_audit/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_audit"]

[tool.hatch.build.targets.wheel.force-include]
"docs/test_quality.md" = "axm_audit/docs/test_quality.md"
"docs/fix_pipeline.md" = "axm_audit/docs/fix_pipeline.md"
"docs/index.md" = "axm_audit/docs/index.md"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-asyncio>=0.24",
    "pytest-json-report>=1.5",
    "pytest-mock>=3.15.1",
    "ruff==0.15.13",
    "mypy>=1.20.0",
    "pre-commit>=4.0",
    "pip-audit>=2.0",
    "bandit>=1.9.3",
]
docs = [
    "mkdocs-gen-files>=0.6.0",
    "mkdocs-literate-nav>=0.6.3",
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=1.0.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    "*/_version.py",
    "scripts/*",
    "tests/fixtures/fix_corpus/*/input",
    "tests/fixtures/fix_corpus/*/expected",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "PLR", "S", "T20", "RUF"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "PLR2004"]
# Fix-corpus loaders intentionally invoke `git` and `axm-audit` by PATH name
# (subprocess controls all args; no untrusted input).
"tests/fixtures/fix_corpus/conftest.py" = ["S603", "S607"]
"tests/fixtures/fix_corpus/regenerate.py" = ["S603", "S607"]
"src/axm_audit/core/rules/quality.py" = ["S603", "S607"]
"src/axm_audit/core/rules/dependencies.py" = ["S603", "S607"]
"src/axm_audit/cli.py" = ["T201", "PLR0913"]
"src/axm_audit/core/test_runner.py" = ["PLR0913"]
# core/fix/ is the relocated fix-proto: deterministic CST-based test reorganiser
# (12 modules, intentionally complex). libcst visitor methods (leave_*/visit_*)
# require PascalCase names (N802); CST rewriters routinely exceed cyclomatic /
# branch / statement / arg thresholds; sha1 is used for content fingerprints
# (not security); subprocess calls invoke ruff via local PATH (not untrusted
# input). Same rationale as core/test_runner.py for PLR0913.
"src/axm_audit/core/fix/*" = [
    "B007",
    "C901",
    "E501",
    "N802",
    "PLR0911",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR1714",
    "PLR2004",
    "RUF005",
    "RUF022",
    "RUF034",
    "S324",
    "S603",
    "S607",
]
# Pydantic models intentionally use `Field(default_factory=...)` for mutable defaults.
"src/axm_audit/core/rules/test_quality/duplicate_tests.py" = ["RUF012"]
"src/axm_audit/core/rules/test_quality/pyramid_level.py" = ["RUF012"]
"src/axm_audit/core/rules/test_quality/tautology.py" = ["RUF012"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

[tool.ruff.lint.isort]
known-first-party = ["axm_audit"]

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_audit"]
extend_exclude = ["scripts"]

[tool.deptry.per_rule_ignores]
DEP004 = ["mkdocs_gen_files"]

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.axm-audit.mirror]
# tools/audit.py is the `axm-audit audit` sub-command wrapper. Per the pyramid
# spec, the single-binary canonical e2e name strips the binary prefix, so
# `tests/e2e/test_audit.py` IS the canonical form — not an anti-mirror smell.
exempt_paths = [
    "**/__init__.py",
    "_version.py",
    "__main__.py",
    "tools/audit.py",
]

[[tool.axm-audit.duplicate_tests.acknowledged]]
