[project]
name = "axm-echo"
dynamic = ["version"]
description = "Neural similarity & echo detection over code corpora (MiniLM + scikit-learn)."
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Gabriel Jarry", email = "gabriel@axm-protocols.io" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "axm",
    "axm-ast",
    "axm-config",
    "numpy>=2.5.1",
    "scikit-learn>=1.9.0",
    # echo IS neural: the default backend is MiniLM (sentence-transformers on
    # torch), so the neural stack ships in the base install (AXM-2188). The
    # `tfidf` backend remains a pure-CPU option for callers that want to avoid
    # loading torch at runtime.
    "torch>=2.12.1",
    "sentence-transformers>=5.6.0",
]

[project.urls]
Homepage = "https://github.com/axm-protocols/axm-forge-workspace"
Documentation = "https://axm-protocols.github.io/axm-forge-workspace/"
Repository = "https://github.com/axm-protocols/axm-forge-workspace.git"
Issues = "https://github.com/axm-protocols/axm-forge-workspace/issues"

[project.entry-points."axm.tools"]
echo_code = "axm_echo.tools:EchoCodeTool"
echo_check = "axm_echo.tools:EchoCheckTool"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "echo/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match echo/v*" }
fallback-version = "0.0.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_echo/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_echo"]

[tool.hatch.build.targets.wheel.force-include]
"docs/index.md" = "axm_echo/docs/index.md"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff==0.15.21",
    "mypy>=2.2.0",
    "prek>=0.4.9",
]
docs = [
    "mkdocs-material>=9.7.6",
    "mkdocstrings[python]>=1.0.6",
    "mkdocs-gen-files>=0.6.1",
    "mkdocs-literate-nav>=0.6.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "S", "T20", "PLR", "RUF"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "S603", "S607", "PLR2004"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

[tool.ruff.lint.isort]
known-first-party = ["axm_echo"]

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
pretty = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true

# Third-party libs without type stubs that axm-echo actually imports.
# sentence_transformers / torch are base deps (AXM-2188) but ship no py.typed
# marker, same as sklearn.
[[tool.mypy.overrides]]
module = [
    "sklearn.*",
    "sentence_transformers.*",
    "torch.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*", "conftest"]
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]


# ─────────────────────────────────────────────────────────────────────────────
# axm-audit Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.axm-audit.mirror]
# `tools.py` is exempt below; `scope.py` is now unit-tested (test_scope.py)
# at the axm-config seam plus integration-covered (test_scope__load_scope.py).
#
# `tools.py` is the `echo_code` AXMTool surface (MCP/CLI/DAG node). Its
# `execute` runs the corpus-extract -> embed -> cluster pipeline, all real
# I/O (filesystem walk + model embedding), so it is covered at the integration
# tier (test_echo_code.py) and the e2e tier (CLI subprocess). A unit mirror
# would have to mock the corpus and the backend wholesale, which the pyramid
# forbids; the pure clustering logic it orchestrates lives in `cluster.py`,
# which IS unit-tested (test_cluster.py).
exempt_paths = ["tools.py"]
# `_version.py` is generated by hatch-vcs and is on the rule's built-in
# forward-exempt list, so `test_version.py` (a legitimate smoke test of the
# generated `__version__` string) surfaces as a reverse-direction orphan.
# Whitelist that one cross-cutting test from the orphan check; it asserts a
# real source symbol, it is just not 1:1-mirrorable onto an exempt module.
# `test_tools_guards.py` guards the mirror-exempt `tools.py` surface (the
# echo_code/echo_check input validation + the demoted-pair payload bound); it
# asserts real behaviour of an exempt module, so it is not 1:1-mirrorable.
exempt_tests = ["test_version.py", "test_tools_guards.py"]

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_echo"]

[tool.deptry.per_rule_ignores]
DEP004 = ["mkdocs_gen_files", "pytest"]

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_echo",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--cov-fail-under=90",
]
filterwarnings = ["error"]
markers = [
    "integration: tests that hit real external boundaries (filesystem, DB, network)",
    "e2e: end-to-end tests that exercise the CLI via subprocess",
    "no_package_symbol_ok: opt out of TEST_QUALITY_NO_PACKAGE_SYMBOL (packaging-invariant test, not a runtime symbol)",
    "scenario_name_ok: opt out of TEST_QUALITY_FILE_NAMING SPLIT/NAME_MISMATCH (intentional named scenario)",
]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_echo"]
branch = true
relative_files = true
# _version.py is generated by hatch-vcs (no testable logic)
omit = ["*/tests/*", "*/_version.py"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
show_missing = true
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Changelog Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "echo/v[0-9].*"
