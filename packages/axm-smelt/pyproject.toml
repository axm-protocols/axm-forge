[project]
name = "axm-smelt"
dynamic = ["version"]
description = "Deterministic token compaction for LLM inputs"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "AXM Protocols", email = "gabriel@axm-protocols.io" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "License :: OSI Approved :: Apache Software License",
]

dependencies = [
    "axm",
    "cyclopts>=4.5",
    "pydantic>=2.12.5",
    "pyyaml>=6.0",
    "tiktoken>=0.9",
]

[project.urls]
Homepage = "https://github.com/axm-protocols/axm-smelt"
Documentation = "https://axm-protocols.github.io/axm-smelt/"
Repository = "https://github.com/axm-protocols/axm-smelt.git"
Issues = "https://github.com/axm-protocols/axm-smelt/issues"

[project.scripts]
axm-smelt = "axm_smelt.cli:main"

[project.entry-points."axm.tools"]
smelt = "axm_smelt.tools.smelt:SmeltTool"
smelt_check = "axm_smelt.tools.check:SmeltCheckTool"
smelt_count = "axm_smelt.tools.count:SmeltCountTool"

[project.entry-points."axm.commands"]
smelt = "axm_smelt.cli:app"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "smelt/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match smelt/v*" }
fallback-version = "0.1.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_smelt/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_smelt"]

[tool.hatch.build.targets.wheel.force-include]
"docs/index.md" = "axm_smelt/docs/index.md"

[tool.axm-audit.mirror]
exempt_paths = ["_types.py", "_version.py", "__main__.py", "**/__init__.py", "cli.py"]

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "9ad9bb2c629d"
reason = "tests assert on distinct value-type encodings (nested dict, pipe-in-string, boolean/null) with mixed `in` vs `==` assertion shapes — parametrization would erase the divergence"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "66f6b4a3fc35"
reason = "pure-table vs mixed-content scenarios assert on different line indices and shapes — distinct concerns that would lose meaning under a generic expected_lines parameter"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "b7fe5dcf4895"
reason = "cleanup_blank_lines asserts on `\\n\\n\\n` absence while multiple_comments / empty_comment assert on `<!--` absence and content survival — distinct invariants per branch"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "e95bbb62bd6f"
reason = "guard_rejects_regression monkeypatches only get_strategy and exercises the natural token-count path, while zero_token_change_discarded additionally pins count() to a fixed value to isolate the same-token-different-text branch — different monkeypatch surfaces guarding distinct pipeline invariants"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "aacab3a12a4b"
reason = "no_match exercises an empty lookup so the function returns the input unchanged, while nested_dict pins recursion correctness with a populated lookup and replacement assertion — distinct branches (passthrough vs substitution) with non-overlapping expected shapes"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "b3014e97a434"
reason = "refs_collision additionally asserts a DEBUG log record was emitted via caplog (the contract on the `_refs` reserved key), while data_collision only asserts the passthrough — the caplog assertion is a separate concern that parametrization would either lose or force onto both cases artificially"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "19f1551479b4"
reason = "15-test cluster covers structurally similar one-liners across distinct format branches (json/yaml/xml/markdown/text) and edge cases (empty, whitespace, doctype, malformed brace, html-heavy) — each test pins a separate detector branch and parametrization would erase the per-format intent"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "73dc33eaff83"
reason = "each test exercises a distinct detector probe (try_json, try_xml, try_yaml) on a negative input — the SUT under test differs across cases, so parametrization would obscure which probe is being verified"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "761417a37983"
reason = "XML minify cases assert on distinct invariants (text preservation via `in`, multi-attribute survival via three `in` checks, CDATA literal block preservation, XML declaration preservation alongside `==` body) — distinct expected shapes per branch resist generic parametrization"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "73304e8fb752"
reason = "caches_encoding_once asserts a single tiktoken call across 100 invocations of one model (single-model cache invariant), while caches_per_model asserts two calls across two distinct models (per-model cache invariant) — different call multiplicities pin distinct cache semantics"

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "d33fec7af617"
reason = "compact_missing_file and check_missing_file exercise distinct CLI subcommands (compact vs check) — each pins the missing-file error path for a separate entrypoint, parametrizing on the callable would obscure which subcommand contract is verified"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff==0.15.12",
    "mypy>=1.20.0",
    "types-PyYAML>=6.0",
    "pre-commit>=4.0",
    "pip-audit>=2.0",
]
docs = [
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=1.0.3",
    "mkdocs-gen-files>=0.5",
    "mkdocs-literate-nav>=0.6.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "PLR", "S", "T20", "RUF"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"src/axm_smelt/cli.py" = ["T201", "PLR0913"]
"tests/*" = ["S101", "S105", "S106", "S108", "PLR2004"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

[tool.ruff.lint.isort]
known-first-party = ["axm_smelt"]

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
pretty = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true

plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_any_explicit = false
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]

[[tool.mypy.overrides]]
module = ["axm_smelt.tools.*"]
disallow_subclassing_any = false

[[tool.mypy.overrides]]
module = ["axm_smelt.cli"]
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = ["tiktoken.*"]
ignore_missing_imports = true

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_smelt"]

[tool.deptry.per_rule_ignores]
DEP004 = ["mkdocs_gen_files"]

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_smelt",
    "--cov-report=term-missing",
    "--cov-report=html:coverage_html",
    "--cov-report=xml",
    "--cov-fail-under=0",
]
filterwarnings = ["error"]
markers = [
    "integration: real I/O or public-API scenarios",
    "e2e: end-to-end subprocess tests",
]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_smelt"]
branch = true
relative_files = true
omit = ["*/tests/*"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Changelog Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "smelt/v[0-9].*"
include_path = "packages/axm-smelt/**"
