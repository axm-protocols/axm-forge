[project]
name = "axm-anvil"
dynamic = ["version"]
description = "Deterministic CST-based refactoring toolkit for Python — move, rename, split, merge symbols atomically across files."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "AXM Protocols", email = "gabriel@axm-protocols.io" }]
keywords = ["refactoring", "cst", "libcst", "ast", "move-symbol", "rename", "mcp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Code Generators",
    "Typing :: Typed",
]

dependencies = [
    "axm",
    "axm-ast",
    "axm-edit",
    "cyclopts>=4.5",
    "libcst>=1.5.0",
    "pydantic>=2.0.0",
]

[project.scripts]
axm-anvil = "axm_anvil.cli:app"

[project.entry-points."axm.tools"]
ast_move = "axm_anvil.tools.move:MoveTool"

[project.urls]
Homepage = "https://forge.axm-protocols.io"
Documentation = "https://forge.axm-protocols.io"
Repository = "https://github.com/axm-protocols/axm-forge"
Issues = "https://github.com/axm-protocols/axm-forge/issues"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "anvil/v(?P<version>.*)"
raw-options = { root = "../..", git_describe_command = "git describe --dirty --tags --long --match anvil/v*" }
fallback-version = "0.0.0.dev0"

[tool.hatch.build.hooks.vcs]
version-file = "src/axm_anvil/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/axm_anvil"]

[tool.hatch.build.targets.wheel.force-include]
"docs/index.md" = "axm_anvil/docs/index.md"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff==0.15.14",
    "mypy>=1.20.0",
    "pre-commit>=4.0",
]
docs = [
    "mkdocs-material>=9.0",
    "mkdocstrings[python]>=1.0.3",
    "mkdocs-gen-files>=0.6.0",
    "mkdocs-literate-nav>=0.6.3",
]

# ─────────────────────────────────────────────────────────────────────────────
# Ruff Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]
exclude = ["*/_version.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "BLE", "C4", "C901", "S", "T20", "PLR", "RUF"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S108", "S603", "S607", "PLR2004"]

[tool.ruff.lint.isort]
known-first-party = ["axm_anvil"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-locals = 15

# ─────────────────────────────────────────────────────────────────────────────
# MyPy Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_any_explicit = true
pretty = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
show_error_codes = true
exclude = ["tests/integration/fixtures/"]

[[tool.mypy.overrides]]
module = ["tests.*", "conftest"]
disallow_untyped_defs = false
disallow_any_explicit = false
ignore_missing_imports = true
disable_error_code = [
    "index",
    "arg-type",
    "attr-defined",
    "operator",
    "union-attr",
    "call-overload",
]

[[tool.mypy.overrides]]
module = ["axm.*", "libcst.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["axm_anvil.tools.*"]
disallow_subclassing_any = false

# ─────────────────────────────────────────────────────────────────────────────
# Deptry Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.deptry]
known_first_party = ["axm_anvil"]

[tool.deptry.per_rule_ignores]
DEP004 = ["mkdocs_gen_files", "pytest"]

# ─────────────────────────────────────────────────────────────────────────────
# Pytest Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--import-mode=importlib",
    "--cov=src/axm_anvil",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--cov-fail-under=0",
]
filterwarnings = ["error"]
markers = [
    "integration: tests that hit real external boundaries (filesystem, DB, network)",
    "e2e: end-to-end tests that exercise the CLI via subprocess",
]

# ─────────────────────────────────────────────────────────────────────────────
# Coverage Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/axm_anvil"]
branch = true
relative_files = true
# Mirror-exempt façades (see [tool.axm-audit.mirror].exempt_paths): no
# unit-testable logic — cli.py is a cyclopts wrapper, _version.py is
# hatch-vcs generated, __main__.py is the entry shim.
omit = ["*/tests/*", "*/cli.py", "*/_version.py", "*/__main__.py"]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
show_missing = true
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "raise NotImplementedError"]

# ─────────────────────────────────────────────────────────────────────────────
# Git-Cliff Changelog Configuration
# ─────────────────────────────────────────────────────────────────────────────
[tool.git-cliff.changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "🔧 Refactor" },
    { message = "^test", group = "🧪 Tests" },
]
tag_pattern = "anvil/v[0-9].*"

# ─────────────────────────────────────────────────────────────────────────────
# axm-audit test-mirror exemptions (façades with no unit-testable logic)
# ─────────────────────────────────────────────────────────────────────────────
[tool.axm-audit.mirror]
# cli.py        — thin cyclopts wrapper, delegates entirely to core (no logic)
# core/postprocess.py — private _ruff_fix subprocess façade, covered by integration
exempt_paths = [
    "**/__init__.py",
    "_version.py",
    "__main__.py",
    "cli.py",
    "core/postprocess.py",
]

# ─────────────────────────────────────────────────────────────────────────────
# axm-audit acknowledged duplicate-test clusters
# ─────────────────────────────────────────────────────────────────────────────
[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "3898437281a2"
reason = "Three divergent import concerns: intra-package asserts the relative import is PRESERVED, cross-package asserts it is CONVERTED to absolute, and include_helpers_false asserts a skipped helper is ABSENT from the target — opposite outcomes, not shared data."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "caf1e7efb56c"
reason = "Different import kinds and outcomes: absolute_import_untouched asserts `import os` is copied verbatim, while cross_package_real_files asserts a relative `.utils` import is rewritten to absolute `alpha.utils` — distinct branches of the import-rewrite logic."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "43137c935923"
reason = "Opposite __all__ branches: all_added_to_existing_target asserts a moved EXPORTED name is appended to the target __all__, whereas all_untouched_for_unexported_symbol asserts BOTH __all__ lists stay unchanged when the moved symbol is not exported."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c560ca201423"
reason = "Divergent setup and detection path: duplicate_mode_default drives a directly-shared helper via the shared_helper_fixture, while transitive_shared_helper_detected builds an inline two-hop chain (_b -> _a) to exercise TRANSITIVE sharing detection — different fixtures and a different code path, not the same data."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "3c07c9f9c530"
reason = "Different warning categories: string_forward_ref_warns asserts a string-annotation forward-reference warning naming the moved symbol, while side_effect_decorator_bare_warns asserts a 'side-effect decorator' warning naming a bare @fixture — unrelated detectors with different warning text."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c5e5201d1e9d"
reason = "Negative assertions on different detectors: forward_ref_no_false_positive asserts no 'forward-reference' warning when only a substring-overlapping name is moved, while non_whitelisted_decorator_no_warn asserts no 'side-effect decorator' warning for an unlisted decorator — distinct false-positive guards."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "3a81e051d1f0"
reason = "Divergent branches behind the same `is None` assertion: none_on_clean_graph exercises the no-new-cycle path on an acyclic graph, while ignores_preexisting_cycle exercises the distinct branch where a pre-existing cycle exists but the new edit does not touch it (must not be re-flagged)."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "2dad91435120"
reason = "Different concerns behind the same `result == []` assertion: deep_chain_does_not_recurse is a recursion-depth regression guard on a 10k-node chain (stack-overflow protection), while no_cycle_returns_empty is a trivial acyclic correctness case — same outcome, distinct intent and input scale."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "9ec978333da8"
reason = "Both raise ImportCycleError but over distinct setups and contracts: move_cross_package_detects_cycle builds an inline two-package uv workspace to assert the AC3/AC6 cross-package detection (formerly skipped), while intra_package_cycle_detection_unchanged is the AC5 regression guard for same-package detection — different fixtures, different code paths."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "8f2a8b79db2c"
reason = "Distinct rewrite concerns: subscript_chain asserts the attribute rewrite reaches into a subscript node (`pkg.new.Foo[key]`), while leaves_other_symbols asserts selectivity — the target `Foo` is rewritten but a non-target `Other` on the same alias is left untouched (`pkg.old.Other` preserved). Different node types and different assertions."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "1f3ae3172b3e"
reason = "Three divergent concerns across files: overload_partial_move_raises asserts OverloadPartialMoveError, symbol_already_exists_raises asserts a different exception SymbolAlreadyExistsError, and string_forward_ref_not_rewritten is a non-raising happy-path dry_run asserting the literal forward-ref string is preserved in source_text_new — different exceptions plus a return path, not shared data."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "577ca9835640"
reason = "Mixes a raises/rollback branch with two happy-path moves: move_parse_error_rollback monkeypatches a render seam to force MoveValidationError and asserts both files roll back, while move_simple_class asserts plan.moved_names and move_with_direct_constants asserts plan.constants_added — a raise path versus two return paths checking different fields over different setups (fixture copy vs inline write)."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "cd5773994a7e"
reason = "Three distinct RemoveSymbols branches: keeps_nested_definition asserts a class method matching the target name is NOT removed (depth != 0 guard), keeps_multi_target_assignment asserts a tuple-target assignment is not a bare-Name match, and preserves_formatting asserts comments/blank lines survive removal — different inputs and different assertions per branch."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "1337a49355e7"
reason = "Three distinct ProtectConditionalImports branches: try_except_imports_tagged asserts both arms get noqa (count==2), if_guard_body_tagged asserts only the guarded import is tagged while a bare module-level import is left alone (count==1), and idempotent_existing_noqa asserts an already-tagged import is not double-tagged — different noqa counts and structures."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "39b4242e7761"
reason = "Two distinct depth-guard skip paths: skips_nested_try asserts a try/except guard nested inside a function (depth != 0) is left untouched, while skips_nested_if asserts an if guard nested inside a function is skipped — different CST node types exercising the same depth gate via different constructs."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "ac246d3dd420"
reason = "Two distinct RenameSymbols string-annotation paths: leaves_string_annotation_without_match asserts a valid string annotation with no rename target is preserved, while leaves_unparsable_string_annotation asserts a syntactically invalid string annotation is left untouched (parse-failure fallback) — different code paths (no-match vs parse-error)."

[[tool.axm-audit.duplicate_tests.acknowledged]]
hash = "c0eee7ae9c50"
reason = "Two distinct SyncDunderAll no-op branches: ignores_non_dunder_all_assign asserts a non-__all__ assignment is untouched, while ignores_non_list_tuple_value asserts an __all__ bound to a call (not a list/tuple literal) is untouched — different guard conditions both yielding identity, asserted on different inputs."
